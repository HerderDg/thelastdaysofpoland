jom_expedition.148.t: "Dawn of the Gods" 
jom_expedition.148.desc: "Unlike Vinland or Greenland, Antarctica holds no record of Norse settlement. Its documented history begins only in the modern era, when 19th-century expeditions confirmed the existence of a vast southern continent long theorized by geographers. Subsequent exploration revealed a frozen expanse larger than Europe, dominated by ice shelves, subglacial mountains, and conditions inhospitable to permanent habitation. International scientific stations now maintain limited presence along its periphery, governed by cooperative treaty rather than sovereignty. Despite its recent entry into recorded history, Antarctica's scale and remoteness have fostered persistent speculation. Reports of subglacial lakes, unexplored mountain ranges, and unexplained geological formations have contributed to its reputation as one of Midgard's final unknown frontiers. Members of the Jomsviking expedition describe the approach in elevated terms, likening the continent's icebound horizon to a threshold beyond the known world. Commanders have characterized the mission as exploratory and symbolic, suggesting that the vast white interior represents not merely territory, but revelation, almost like it's meant to be a gate to the realm of gods. Landfall is expected under severe conditions. Whether Antarctica will yield scientific insight, strategic value, or something less easily defined remains to be seen." 
jom_expedition.148.a: "Why are we going to this frozen hell?" 
  
jom_expedition.149.t: "Expedition Failed"
jom_expedition.149.desc: "The expedition has been terminated due to critical losses sustained during transit. Severe weather conditions damaged multiple vessels beyond repair, resulting in loss of supplies and personnel. Remaining ships were deemed unfit to continue the mission. Navigation instruments were compromised, and remaining ships lacked sufficient provisions to continue. Command ordered immediate withdrawal. Mission objectives were not completed. Surviving forces have returned to port for recovery and reassessment."
jom_expedition.149.a: "a"

jom_expedition.150.t: "Expedition Delayed"
jom_expedition.150.desc: "Progress has been slowed due to unfavorable wind conditions and minor sail damage sustained during rough weather. Temporary repairs were completed at sea. No casualties reported. Course remains unchanged. Estimated delay is minimal, pending improved wind conditions."
jom_expedition.150.a: "Anchors aweigh!"

jom_expedition.151.t: "Expedition Delayed"
jom_expedition.151.desc: "The fleet diverted from its plotted course after reports of a nearby coastal settlement not marked on the original route. Command approved temporary landfall to assess resupply opportunities and gather intelligence. Time was spent negotiating, trading, and conducting reconnaissance. Some minor hostilities occurred. Departure resumed after several days. Delay moderate but controlled."
jom_expedition.151.a: "Resume course"

jom_expedition.152.t: "Expedition Delayed"
jom_expedition.152.desc: "Internal conflict broke out among crew members of the lead vessel following disputes over leadership decisions and distribution of spoils from prior raids. A faction attempted to challenge command authority during night watch. The disturbance was contained after brief violence on deck. Two fatalities reported. Instigators executed. Fleet stability restored, but morale remains strained. Departure and progress delayed while order was reestablished."
jom_expedition.152.a: "Maintain order!"

jom_expedition.153.t: "To the Acting Leadership of Jomsborg"
jom_expedition.153.desc: "The United Nations unequivocally condemns the sustained maritime raids and organized hostilities carried out by forces under your command. Confirmed reports presented to the Security Council document repeated attacks on civilian vessels, armed incursions into coastal settlements, unlawful seizure of property, and the detention of non-combatants. These actions constitute serious violations of international law and pose a direct threat to regional stability and international maritime security.\n\nDespite prior calls for restraint and de-escalation, hostile activities have continued. The scale and coordination of these operations demonstrate clear command responsibility. The safety of civilian populations and the protection of recognized shipping corridors can no longer be assured under current conditions.\n\nAccordingly, under the authority granted by the United Nations Charter and pursuant to an emergency resolution of the Security Council, a multinational maritime stabilization force has been authorized and is now in the process of deployment to the affected region. Advance elements are en route. The mission's mandate includes the protection of civilian shipping, deterrence of further armed incursions, and restoration of secure navigation routes.\n\nThis communication serves as formal notice that the United Nations has initiated operational measures in response to your continued actions. The objective of the mission is defensive and stabilizing in nature. However, any attempt to obstruct or engage deployed forces will be met in accordance with established rules of engagement.\n\nYou are urged to order an immediate cessation of all offensive operations and to cooperate fully with UN representatives upon their arrival.\n\nThe responsibility for the present circumstances rests with your leadership. The United Nations will act to uphold international law and protect civilian life."
jom_expedition.153.a: "Sincerely, United Nation Security Council"

