## Events ##

 jom_expedition.1.t: "Return to Folkvangr" 
 jom_expedition.1.desc: "Folkvangr, the place where it all began, where elder gods smiled upon the carmine vikings. Settlement established by the lost and faithful group of warriors upon the eastern coast of the island of Bornholm, became somewhat of a tourist attraction after the great exodus. Groups of intrigued Danes and people from other countries, as well as sociologists came to gaze upon this unusual village built by the modern day vikings from Poland." 
 jom_expedition.1.a: "Let's take what we left behind." 
 
 jom_expedition.2.t: "Remains of the Exodus"
 jom_expedition.2.desc: "A small group of knarrs arrived at the empty, grand harbour with brisk Baltic winds in their carmine sails. Vikings aboard them saw the sight of what they had left several months ago, the memories of their toil and hard work building and preparing the grand fleet came flooding, as they gazed upon the huts they not so long ago lived in, most of collapsed due to time and neglect.\n\nTo the annoyance of the local tourist industry, within a few hours the Folkvangr settlement has been cleared off of any remaining valuables and good quality materials, that remained after the exodus. To commemorate the last goodbye with the land that they held so dear, despite how brief their stay was, carmine vikings raised a runestone in the place where the longhouse used to be. They spent a moment in prayer to the Allfather, before returning aboard their ships, with decks filled with materials that will be used across their new territories, beyond the Baltic's blue expanse."
 jom_expedition.2.a: "We leave with Freya's blessing."
 
 jom_expedition.3.t: "EMPTY"
 jom_expedition.3.desc: "EMPTY"
 jom_expedition.3.a: "EMPTY"
 
 jom_expedition.4.t: "Land of the Goths" 
 jom_expedition.4.desc: "The biggest of the Baltic islands, the ancient home of the famed Goths, has come into sights of the Jomsborg Vikings due to its historical significance. Gotland, for centuries a part of the Swedish crown hosts a great treasure trove of artifacts in its largest town. This fact has come to the attention of the Carmine Jarl while seeking ancestral marks, in pursuit of his ancestors legacy. A small fleet has been dispatched to Visby, to the surprise of locals, who at first thought the newcomers are just big fans of viking culture visiting the museum." 
 jom_expedition.4.a: "Let's say hi to the locals!" 
 jom_expedition.4.b: "Ancestors legacy awaits!" 
 
 jom_expedition.5.t: "Warm welcome in Visby"
 jom_expedition.5.desc: "To the surprise of local law enforcement, newcomers clad in crude animal hides were friendly, greeting the beachgoers with very broken Danish, upon landing their knarrs on the sands just outside Visby. After a few photos with confused but intrigued tourists and locals, Vikings made their way to the city, watched closely by the police officers. The mayor of the town quickly showed up at the harbour, to welcome the unusual guests. With a mixture of hand gestures and confused rambling, a trade deal was agreed upon allowing the Jomsborg traders fill the coffers of the knarrs with food and Goth themed fridge magnets.\n\nJust before they set sail once more, the Mayor offered a bonus to the guests, a 25% discount for a group ticket to the Gotland Museum, which the vikings gladly accepted. They spent several hours, sightseeing, and gazing upon the history of their ancestors. As their minds were filled with inspiration, and with bellies full of mead from local brewery, they returned to their boats, and bid farewell to the locals, with carmine sails soon disappearing beyond the horizon."
 jom_expedition.5.a: "We should go again sometime."
 
 jom_expedition.6.t: "Night at the Museum"
 jom_expedition.6.desc: "Local police force wasn't at all prepared for what was about to happen, as knarrs sailing under carmine banners, came crashing down on the local beaches. Resistance quickly died down, as locals realised what the invaders are here for: The Visby Gotland Museum. The casualties were minimal, as most people evacuated the building, however a few zealous custodians gave their lives to stop the carmine menance. Polished floors ran red with blood, as runes and artifacts were plundered from the halls of the museum. \n \n After the museum was cleared, chests full of artifacts were carried back to the knarrs. The rest of the city was cordoned off, and awaiting reinforcements from the Swedish national guard, so the Jomsborg Vikings set fire to the plundered building, and headed back into the sea, leaving people of Visby just as confused, as traumatised. Soon, Carmine Jarl shall have his prize of priceless ancestral artifacts."
 jom_expedition.6.a: "It's ours by birthright!"
 
 jom_expedition.7.t: "Crown of the North" 
 jom_expedition.7.desc: "Venice of Scandinavia, glistened in the morning sun, as cold northern wind flown between the city's buildings. The gaze of Carmine Jarl was laid on the prosperous metropolis of the strongest of the northern monarchies. To the vikings, Sweden is one of the ancestral lands, that the warriors track their lineage to. The Kingdom of Queen Victoria holds vast riches both cultural, financial and deep within the soil. As the carmine sails emerged from below the horizon, the canals of Stockholm will soon become especially interesting, for better or worse." 
 jom_expedition.7.a: "Ivarr, play something catchy." 
 jom_expedition.7.b: "Ivarr, pump up the boys." 
 
 jom_expedition.8.t: "Audience with the Queen"
 jom_expedition.8.desc: "To a pleasant surprise of local populace, the vikings arrived with good intentions, bringing various trade goods for exchange. With an energetic rhytm of drums, a caravan disembarked in canal harbours and began it's journey to the city center, their goal? Audience with the Queen. Enormous traffic jams clogged the entire city, while overwhelmed local police force was somewhat paralysed at the unusual event taking place. \n \n Upon arriving at the palace, the Swedish monarch welcomed the jubilant convoy. Queen Victoria accepted various gifts and trinkets from the Jomsborg vikings, value of which was questionable at best, but the ruler was jovially endeared by the gesture. In return, she used her influence and contacts to provide valuable materials, dockyard contracts and know how to the neighbours from beyond the Baltic. Vikings returned to the harbour, using a new Volvo gifted by the Queen, her farewell gift to the unusual guests."
 jom_expedition.8.a: "Now how do we put the car in the knarr?"
 
 jom_expedition.9.t: "The Viking Paradox"
 jom_expedition.9.desc: "War drums echoed throughout the harbour of the capital, intensifying with every second. Utilising the canals, knarrs flowing the Jomsborg banner swiftly overwhelmed local authorities. Arriving in force, carmine warriors spread throughout the city, raiding and plundering any and all riches they could find. All in the name of enforcing reparations for the XVIIth century Deluge, the Swedes never repaid. Now, vikings of the Polish coast came to reclaim what's rightfully not Swedish, with interest. With fires spreading and chaos reigning over the Swedish capital, a small detachment of axe wielding, caped housecarls of the Jarl himself, made their way to the main office of a Paradox Interactive. For legend has it, deep within the bellows of it's basement, laid the single copy, of Svea Rike IV. \n \n As night fell, fires began to die down. With the Swedish army mobilised for defence of Stockholm, vikings reorganised and embarked the knarrs, which creaked under the weight of plundered riches. While the raiding fleet evaded the Swedish navy, the PC in Carmine Jarl's longhouse awaited for a legendary game night."
 jom_expedition.9.a: "THEY MADE A 4TH ONE AND DIDN'T TELL US?!"
 
 jom_expedition.10.t: "Voyage to Rugen" 
 jom_expedition.10.desc: "Not long after the Norse Revival happened on Bornholm, the new generation of Vikings started to wonder if they were the only ones to rekindle the tradition of the sea-warriors. They delved deep into the history books and learned about Slavic chąśniks that once inhabited the lands that now belong to the Germans. On Rügen, they had their religious center. Letting their imagination run wild, the Vikings decided to travel on the island in hopes of finding the descendants of Chąśniks ready to ally or fight an equal fight with the Vikings.\nWhen they arrived, however, they found only local fishermen and tourists. Even the dreams of visiting or burning the famed Arkona temple were broken; The temple and even the shore it stood on were gone, claimed by history and the sea." 
 jom_expedition.10.a: "Fighting them won't earn us a place in Valhalla" 
 jom_expedition.10.b: "Time to remind them of their legacy"
 
 jom_expedition.11.t: "Remains of a Warrior's Path"
 jom_expedition.11.desc: "The local economy was based mostly on the fishing industry and tourism; as such, regular traders could offer them little, although the Vikings were pleased by occasional pickled herring or a pack of banknotes handed to them. But that wasn't their goal. They wanted to see the most recent proof of these people's warrior spirit. They travelled to the city of Sassnitz to see the HMS Otus, a famous local museum ship. They argued they wanted to buy the submarine and bring it back to its former glory. A local entrepreneur, who owned the ship, agreed for a copious amount of money. After the traders from a strange land expressed their disappointment that they weren't able to buy a true German vessel. As a consolation prize, the entrepreneur pointed them towards Peenemünde, where an old Soviet U-461 submarine was stationed for them to pick up on their way back."
 jom_expedition.11.a: "Shame, we didn't have time for U-995"
 
 jom_expedition.12.t: "Teaching by Example"
 jom_expedition.12.desc: "Enraged by the lack of worthy opponents or allies and driven by the vengeance due to the Norse blood, the island inhabitants' ancestors spilt, the Vikings conducted a brutal raid on Rugen. They blew up the Strelasund Crossing, the only way on the island, and began burning buildings and robbing wealthy German tourists of their valuables. They set the Svetovit statue, one of the last symbols of Slavic presence on the island, to avenge all of the humiliation their forefathers suffered at the hands of Chąśniks.\nOn their way back home, they stopped by Peenemünde to transport an old V2 rocket to bring it home and use it against their enemies. One of the witnesses claimed one of the Vikings tried to mount the rocket and fly on it back to Vendland."
 jom_expedition.12.a: "May this hardship awaken the Rugian spirit!"
 
 jom_expedition.13.t: "Hanseatic Coast of Germany" 
 jom_expedition.13.desc: "While the city of Lübeck, once a Queen of the Hanseatic League lost its importance as the naval trade routes turned west, enriching nearby Hamburg. Nevertheless, it's still one of the most important European ports, especially to all countries that border the Baltic Sea. It's no wonder the city and the surrounding area attracted the attention of the Carmine Vikings. Here they look from their knarrs with ire upon the lost lands of the Danes. The great city of Hedeby and the mighty fortification of Danevirke, lying in ruins after decades of German negligence. But as much as they may seethe with rage, they can also see the German fleet ready after the Vikings' previous exploits on German land." 
 jom_expedition.13.a: "Let's take it easy" 
 jom_expedition.13.b: "We'll take Hedeby and even the Kiel Canal!"
 
 jom_expedition.14.t: "Hanseatic City of Jomsborg"
 jom_expedition.14.desc: "The Norsemen waved a diplomatic flag and were escorted by the German military boats. They were greeted in the city by a mayor, the German Minister of Finance, and a European Commissioner for Economic and Financial Affairs. They were shown the old town of Lübeck and its various landmarks. They were assured that the old Norse sites are well protected and cared for. Then they were directed to the city hall, where the offer of a trade agreement between the European Union and Vendland was made. To further sweeten the deal, the City of Jomsborg was included in an elite list of Hanseatic Cities. The Vikings left feeling they'd done all they could to enrich their homeland."
 jom_expedition.14.a: "We've done all we could"
 
 jom_expedition.15.t: "The German Storm"
 jom_expedition.15.desc: "The Germans asked the Vikings to wave the diplomatic flag or the flag of surrender. They've done neither and opened fire on the German patrol boat and tried to push through to perform a quick amphibious assault. They hoped the Germans would be as unprepared as they were during their excursion to Rügen. They were wrong.\nAs soon as they opened fire, they were encroached by numerous swift patrol ships that quickly surrounded them and overwhelmed them. The battle ended quickly. All members of the raiding party now drifted dead on the dark waters of the Baltic Sea among the wreckage of their ships, having dealt minimal damage to the Germans."
 jom_expedition.15.a: "See you in Valhalla"
 
 jom_expedition.16.t: "Stop on the Klaipeda" 
 jom_expedition.16.desc: "Klaipeda, the city so distinct from the other Lithuanian cities. The Fachwerk architectural style of the old town and the orderly street structure betray its German and Swedish influences. This elegant district is surrounded by the numerous city blocks inherited from the times of the USSR. They stood the test of time, providing affordable and comfortable accommodation to everyone who needed them. The orderly and elegant Germanic heart surrounded by a robust, concrete socialist body. And all of that in the former lands of the Commonwealth. The Carmine Vikings should feel as if they were at home here." 
 jom_expedition.16.a: "Time for some brotherly trade" 
 jom_expedition.16.b: "We are at home. Let's take what's ours"
 
 jom_expedition.17.t: "Shipwrights' Dreams"
 jom_expedition.17.desc: "And home they found. For the money they brought the Vikings received numerous oil containers to carry back home with them. Before they left, they took their time roaming around Lithuanian taverns, bringing much joy to the gloomy dock workers. In their free time, they recited from memory their monumental sagas detailing their ancient as well as present exploits. Many of the locals were so enthralled by the tales of adventures in foreign lands that they decided to enlist in the Alþýduher. Many of them were engineers specialising in shipbuilding, who wanted to instruct the Vikings on how to conquer the seven seas in something more impressive than a repurposed fishing barge."
 jom_expedition.17.a: "We made some friends today"
 
 jom_expedition.18.t: "The Last Raid of Lithuania"
 jom_expedition.18.desc: "In the Vikings' minds, the city should be theirs anyway. So their taking only some of their resources is an act of charity from their perspective. The dark of the night was brightened by the explosions in the Lithuanian port. The invaders used lines with hooks to board the oil tankers, taking them over before venturing north to the Butinge oil terminal near Palanga. Then they ventured home, taking with them the red Orlen barrels of oil to fuel their further raids."
 jom_expedition.18.a: "Guess that leaves Lithuania landlocked"
 
 jom_expedition.19.t: "Land of the Kurir" 
 jom_expedition.19.desc: "In the past, the brave Kurir showed defiance to both the kings of Sweden and Denmark. Especially with the Danes, they had quite a history of conflict, helping the Swedish king Sigurdr Ring in a war against Harald Wartooth that secured the former's hold over both kingdoms. Then, one hundred years later, they defied the Danish raid against their lands. What good has it got them? They were not long after subjugated to Sweden. This appears to be a Kurir lot that has repeated itself many times throughout history, and took place not long ago, once again, when they submitted to Evrópusambandið for protection against Garðaríki." 
 jom_expedition.19.a: "The ESB already plunders them enough" 
 jom_expedition.19.b: "They don't deserve even this semblance of independence."
 
 jom_expedition.20.t: "More than Kartöflur"
 jom_expedition.20.desc: "The Vikings landed near Ventspils. They were pleasantly surprised when they saw a city flag waving near the airport - a silver-gold blowing horn in a purple shield on a purple Nordic cross. It made more bloodthirsty berserkers mellow down a bit at the prospect of trade with the locals.\nDuring the night, they approached the director of the coal terminal. The government didn't want any trade with the Vikings, but he was willing to make an exception. For a small regular fee, he would distribute some of the coal to them, either by way of an unsanctioned ship transport or by leaking the legitimate ships' locations so the Vikings could apprehend the shipment bloodlessly. To sweeten the deal, he would also add some bags of concrete. The Vikings left content with this arrangement."
 jom_expedition.20.a: "All under Europe's nose"
 
 jom_expedition.21.t: "Hallucinations from the sea"
 jom_expedition.21.desc: "The Latvian dockworker was splashed on the forehead by an oil leak from the overload in a tank. But that was just a hallucination. It wasn't oil. It was his own blood from a wound dealt by a Viking axe. His colleague, Aivars, tried to put a compress on his wound. But Aivars died from an infection a week ago. In truth, it was another Viking trying to take loot from his pockets.\n-He'll be up for one hell of a surprise - dockworker thought to himself as Viking took nothing out of Latvian's pockets and lost his own pouch. In his last moments, he thought about how his family would fare without his breadwinning, but he soon realised he hadn't been winning any bread or anything really. And his family was sent to a re-education camp due to an anti-Union behavior. He could die in peace now."
 jom_expedition.21.a: "His Struggle Hath Ended"
 
 jom_expedition.22.t: "Islands of Eistland" 
 jom_expedition.22.desc: "'Certain it is the Eistland foe\nThe fair-haired Swedish king laid low.\nOn Eistland's strand, o'er Swedish graves,\nThe East Sea sings her song of waves;\nKing Yngvar's dirge is ocean's roar\nResounding on the rock-ribbed shore.'\n\nSo spoke Thjódólf of Hvini about King Ingvar, son of Eysteinn, and his brave raid on the lands of Eists. There are those who claim that Saga stories such as this one are nothing but fairy tales. What do they have to say when the Sagas are confirmed to be true? Over two decades ago, King Ingvar and his crew were found in the buried ship in Salme on the island of Saaremaa.\nThere are two choices presented to the Vikings: Engage in cooperation with the enemy that earned his victory, or avenge King Ingvar and his companions and bring their bodies back home." 
 jom_expedition.22.a: "Let us pay our respects to the dead and the living" 
 jom_expedition.22.b: "Some crimes cannot be forgiven"
 
 jom_expedition.23.t: "Respectful custodians"
 jom_expedition.23.desc: "At the burial site, the Vikings discovered a group of priests and believers protected by the ceremonial guard, armored in chainmail and spears, gathering near the altar and a cornflower banner. The Norsemen approached them in peace to investigate the nature of the ceremony they've been undergoing. It turned out they were here due to the same reason, celebrating the great battle that took place here. They had a great deal of respect for the Vikings and their exploits. In turn, the warriors of the carmine banner congratulated the Eists for their ancestors' success. Both sides decided it would only be proper if they conducted a joint festival in the name of Thor and Taara - two faces of the same god - honor the fallen of both sides.\nAfter the ceremony, the Vikings were directed towards the officials of the Eistland and the European Union to negotiate a trade deal between both countries. In exchange for their gold, the Vikings would receive the help of Eisti engineers and an influx of civilian goods."
 jom_expedition.23.a: "We forgive and ask for forgiveness"
 
 jom_expedition.24.t: "Unexpected Welcome"
 jom_expedition.24.desc: "When they arrived at Saaremaa, the Vikings expected another idle cattle of people domesticated by the technology that was supposed to elevate them. Instead, they found men and women in chainmail and pointy metal helmets armed with axes, spears, and shields. They carried a banner with a cornflower and were preparing themselves for some form of ceremony when the Vikings arrived.\nThe invaders, seeing the opportunity for an equal fight that would please Odin, decided to exit their boats and engage in combat with them without their firearms. The Eists accepted the challenge.\nThe dance of steel bagan and the clangor of axes overtook the roar of the waves. The battle went on, yet neither side could get any advantage. In fact, it was such a close fight that neither any member of the assailants nor the defenders was struck dead. After dozens of traded blows, an interval was decided. Both sides traded honors and told their reasons for being on the island. The Eists, recognizing the source of the Northmen's wrath, elected to atone for their forefathers' deeds and venture on raids together under the carmine banners."
 jom_expedition.24.a: "There are many ways to pay for crimes"
 
 jom_expedition.25.t: "Shores of the Finns" 
 jom_expedition.25.desc: "The history of Finn-Norse relations dates as far back as antiquity. After centuries of struggle on the Baltic, the Swedes conquered their enemies and, despite the peculiarity of the Finnish language and customs, brought their religion and culture beyond the Aland Sea. The example of the Finns brings hope to the hearts of the Vikings that Nordic values can be spread beyond Scandinavia, and perhaps the Vends will also embrace a new cultural value system.\nBut now is not the time to dream about the future, as the Vikings have to maneuver between numerous minute skerries that dot the coast of Finland." 
 jom_expedition.25.a: "Try to redeem ourseves" 
 jom_expedition.25.b: "The Finns are not that talkative anyway"
 
 jom_expedition.26.t: "Connecting People"
 jom_expedition.26.desc: "The Vikings visited numerous cities, towns, and villages throughout their travels. Each time, they were denied trade or simply ignored by the timid Finns, who wanted nothing to do with what they must've perceived as the barbarians in furs. Each time, they had to traverse the unwelcoming Finnish coast, establishing new camps. They finally found themselves in the deep, freezing north of the country during the night, debating whether to simply force the trade agreement unilaterally, so to speak. \n\nThen, one party that foraged for food found a wooden hut with light still on. They approached the building and knocked on its door. The door was opened by a young, clean-shaven man in a flannel shirt. He welcomed them and introduced himself as Seppo Ilmarinen, and asked the travellers what they were doing here. The Vikings told him of their trading ambitions and their bad luck. He said that he had something that may interest them. He showed them a lamellar-like armor that, instead of metal plates, was composed of the old Nokia phone models. When travellers reacted with scepticism, the strange craftsman put his creation on and ordered one of the Vikings to strike him with an axe. When hit, the inventor bent over because of the pain, but the phone armor remained intact. The Vikings were intersted and asked him to make it usable as an armor for tanks."
 jom_expedition.26.a: "The name stands for 'No KIA'"
 
 jom_expedition.27.t: "Finlandia, Finlandia"
 jom_expedition.27.desc: "The Vikings readied themselves to repeat the cycle their ancestors started by raiding the land of the Finns once again. They sharpened their axes, loaded their guns, and landed on the shore, near one of the villages they wanted to plunder and set up camp in, before going for the main prize of Helsinki.\n\nThey were interrupted by one of the villagers, who dared to approach them. He was a giant of a man with piercing blue eyes and a blond beard. He was wearing a fur coat. He introduced himself as Antero Vipunen and declared that none of the Vikings would pillage Finnish lands ever again. He challenged them to contest. The Norseman chose the most robust and tall of them all, Heimríkr, who was still a head shorter than his opponent. The honorable Viking allowed Finn to pick the weapon of choice. In turn, he tore the nearby tree stump. His enemy unsheathed his sword in preparation, but the tall man just put the stump in front of him. Then he reached into his coat, where he hid a bottle of vodka. The challenge was a drinking contest.\n\nNeither Heimríkr nor any of his companions could outperform Antero, and as time went on, few cared about their mission. After the contest, they asked about the possibility of staying a night in the village."
 jom_expedition.27.a: "None of the returned to Jomsborg"
 
 jom_expedition.28.t: "Rurik's Second Coming" 
 jom_expedition.28.desc: "Russian State was founded by the Varangians, who were Norsemen that ventured into the lands of the Slavs and Finns. Rurik, the founder of the dynasty that ruled Russia for centuries, was one of those Vikings. But many centuries have passed since then, and the Russians have become a different people, due to the influence of eastern culture and the Orthodox Church. Now, Russia is still relatively powerful state, although they have been weakened by the recent war, economic sanctions and regime change. It would still be very risky to raid Russia, but the Jomsborg Vikings are not afraid of risks and they know there is no negotiating with those people that dare to call themselves Russians. They have their eyes set on the city of St. Petersburg, which is a symbol of Russian power and pride, and a treasure trove of riches and culture. However, the Vikings have to be careful, as the Russian state is known for its ruthless and brutal response to any threat." 
 jom_expedition.28.b: "Gardaríki is not what it used to be"
 
 jom_expedition.29.t: "Heart of a Giant"
 jom_expedition.29.desc: "A Jomsviking reconnaissance party operating in the vicinity of Pituffik Space Base has returned with an unprecedented discovery following severe Arctic weather conditions forced them to seek shelter north of the base. The expedition had approached the remote installation cautiously, navigating coastal ice and maintaining distance from visible patrol routes and infrastructure. A sudden storm forced the vessel aground along an isolated stretch of coast. While assessing damage and searching for salvageable materials, members of the crew identified a partially exposed metallic structure embedded in ice and gravel. Subsequent excavation revealed the object to be consistent in size and configuration with a nuclear bomb reportedly lost by the United States military during a 1960s Arctic incident in the region. The device appeared heavily weathered but largely intact. The warhead has been secured under strict supervision. No one says anything regarding intended use, transport logistics, or whether the United States has been informed of the recovery. And it's better that it stays that way."
 jom_expedition.29.a: "We better shut up about this one"
 
 jom_expedition.30.t: "Winter has come for Gardaríki"
 jom_expedition.30.desc: "Petersburg is protected from the sea by the Neva River, which is guarded by numerous fortifications and naval bases such as Kronstadt. The city itself is a maze of canals and narrow streets, making it difficult for the invaders to navigate. Fortunately for the Vikings, their ships are designed for shallow waters and can easily maneuver through the canals and cross under the bridges without much trouble. The main challenge supposed to be the Russian navy, but they appeared to be nowhere to defend their city. Something is wrong in the Russian state, but the Vikings don't care. After a quick raid on the outskirts of the city, they found themselves in the heart of St. Petersburg, where they saw the Hermitage Museum, the Winter Palace, and the Church of the Savior on Spilled Blood. Their visit was quick and brutal, but the real prize appeared to be hanging around in the river. Cruiser Aurora, a symbol of the Russian Revolution. Before anyone could react, the Vikings boarded the ship and took it over. But, instead of starting another revolution, they just decided to take it back home as a trophy and include it in the Jomsborg fleet. This deed should never supposed to succeed, it should've been impossible, but it's just another proof of Russia's descent into chaos and weakness. They're not the boogeyman they used to be, and the Vikings just showed the world how vulnerable they are."
 jom_expedition.30.a: "The Russian bear is fast asleep"
 
 jom_expedition.31.t: "Raiders of the Lost Ark" 
 jom_expedition.31.desc: "In recent years, many refugees and exiles left Poland either by choice or by force. Most of them dispersed among the sea of foreigners, trying to build a new life, but few formed organized groups, such as Alþýduher, which were determined to return to their Fatherland to fight for it. Few, but not all of them. One such group was the Arka Gdynia football team, whose members built a New Ark, a massive boat to carry out the refugees from Vendland to reorganize in Scandinavia to one day return to Poland, once the dust of war settles. Due to many similarities, the Carmine Vikings consider the Arkists to be their brothers and sisters in fate, and so, during their travels, they decided to establish contact with them." 
 jom_expedition.31.a: "Good thing, it's not Green Bay Packers" 
 
 jom_expedition.32.t: "Holmgang"
 jom_expedition.32.desc: "The Vikings indeed saw a giant wooden boat emerging from the horizon. The stories were true, and the Ark didn't leave Sweden. At least not yet. As they got closer, the Vikings noticed makeshift huts attached to the town of Falsterbo, just like barnacles are attached to a ship's hull. Not an unfamiliar sight to the Norse. The travellers swam closer, uninterrupted. The local patrol boats apparently grew accustomed to strange visitors arriving at the small peninsula.\n\nThe Carmine sails came along, and a welcoming committee was sent there. The Arkists, having made sure the Alþýduher is not a football club they were feuding with, greeted the guests with a feast. The team congratulated the Vikings for achieving what they never could, by returning through the Baltic and thriving in the fatherland. They humbly asked if the brave carmine warriors would be willing to have a set-up with them as an exercise between two groups.\n\nThe fight took place in a nearby forest, where two groups fought with bare fists. The battle-hardened Vikings won, but their opponents were fierce nonetheless. Some of the Arkists were so impressed that they decided to fulfill their dream of coming home under the banner of Jarl Sandbjerg, bringing with them insight into the matters of shipbuilding."
 jom_expedition.32.a: "Let's hope we didn't inspire them to invade Pomerania"
 
 jom_expedition.33.t: "EMPTY"
 jom_expedition.33.desc: "EMPTY"
 jom_expedition.33.a: "EMPTY"
 
 jom_expedition.34.t: "Danish Straits" 
 jom_expedition.34.desc: "The Baltic is getting too small for the Vikings. They've seen what Eastern Sea has to offer and need more breathing space. The best way to reach the waters beyond the Danish Straits: Øresund, Great Belt, and Little Belt. While the Copenhagen Convention of 1857 makes them open for commercial shipping, the Danes are unsure whether the potential raider ventures will qualify as trade expeditions. Even if they had a murky status of the Vendland as a state, it leaves them with considerable leverage against Sanbjerg's sailors." 
 jom_expedition.34.a: "Negotitions will be necessary" 
 
 jom_expedition.35.t: "Safe Passage"
 jom_expedition.35.desc: "The negotiations were difficult. The executive of the Danish Maritime Authority expressed a concern that the Vikings' creed demands constant raiding, and he's unsure that he can ensure the safety of Danes living on the other side of the straits, once he unleashes the Carmine ships. The petitioners informed him of the high regard they hold the Kingdom of Danes in for the refuge they provided on Bornholm. They expressed that the prospect of being attacked despite their generosity is unthinkable to them, and their return visit to Bornholm is proof of that.\n\nThe executive took a moment to think and retorted that letting the Vikings through would be another act of charity, and that won't do. Now he would expect their relation to be transactive in nature. Vikings would need to make an on-time donation to the Danish government, and they're free to leave."
 jom_expedition.35.a: "We pay the gold price"
 
 jom_expedition.36.t: "The Enemy of the People"
 jom_expedition.36.desc: "The waters were quiet. Too quiet. The Oslofjord stretched 120 kilometers deep into the land, and yet no one stopped the Vikings. They passed some villages and towns, whose inhabitants hid themselves from the invaders despite having nothing to fear from them; The raiders hunted for a much higher price. They dreamed of being welcomed by the Akershus Fortress before stepping on land, taking from themselves the drakkars from the boat museum, or even taking the famed Gjøa, the first ship that travelled through the Northwest passage, and then taking a break in the folk museum among familiar-looking huts.\n\nThat, however, had to be postponed. Halfway through the fjord, they saw state-of-the-art Norwegian ships firing at the invaders. On the shores, His Majesty's soldiers quickly revealed themselves from hiding. To make things worse, from one of the inlets they passed came more ships, cutting away the escape route for the Vikings."
 jom_expedition.36.a: "The Fight Ended Quicker than It Had Begun"
 
 jom_expedition.37.t: "Land of Midnight Sun" 
 jom_expedition.37.desc: "The wider world has just opened to the Vikings, who are brewing with curiosity and thirst for blood. Now they head towards the last Nordic country that eluded them so far - Norway is bristling with opportunities. Many of them who feel humiliated by the deal with the Danes want some sort of recompense. They want to sail deep into the Oslo Fjord and raid the capital of King Haakon VIII, take the Viking boats from the museums, and pillage the capital to the ground. The others think the expedition should focus on trade to gather more fuel for the most advanced vessels instead of risking it all for some dusty drakkars. And some want to find a compromise and raid a less dangerous area, such as the western coast." 
 jom_expedition.37.a: "To get to their resources we'll need to talk" 
 jom_expedition.37.b: "We'll strike them at heart"
 jom_expedition.37.c: "The West Shall Fall"
 
 jom_expedition.38.t: "In the Hall of the Oil King"
 jom_expedition.38.desc: "The Vikings ventured to Western Norway for the one thing that made this land more than a Swedish-Danish fishing colony - the oil. The black gold that allowed Norway to flourish outside of the European Union and maintain its high standard of living and social benefits. The Vikings were trying to establish a similar society, so they hoped the Norwegians would keep the price low. They were tight, more or less. The CEO of Petoro, the state company that owned the Sture terminal, negotiated an acceptable deal with the strange traders."
 jom_expedition.38.a: "Oil must flow"
 
 jom_expedition.39.t: "The Ways of Yore"
 jom_expedition.39.desc: "The second option: Bergen and Stavanger were much more disappointing. Especially the former, as the second-largest city in Norway. Most they could loot here were fish, watches, and jewelry from the local middle and upper classes. But nothing to write sagas about. The Vikings decided to cheer themselves up by setting St Mary's Church on fire. Even this joy was denied to them. When they arrived, the church was already on fire. In front of it stood the culprit. A thin blond man with a beard. His name was Varg Vikernes, and he expressed an interest in joining the Vikings on their raids. He said he thought he would leave the life of a warrior behind, but the news of the Alþýduher's exploits rekindled the old flame inside him. Before he made the final decision, he discussed with the raiders the failures of capitalism and the importance of environmentalism. Both parties were surprised that they agreed with each other. The musician was fond of the Carmine cause's dedication to eradicating Christianity. After some deliberation, Vikernes was handed his own chainmail and entered one of the knarr."
 jom_expedition.39.a: "The Fallen Rises Again"
 
 jom_expedition.40.t: "PLACEHOLDER: Irelandia" 
 jom_expedition.40.desc: "wikingowie? słowianie? pomorzanie? niemcy?" 
 jom_expedition.40.a: "Handelhandelhandel" 
 jom_expedition.40.b: "Ég ríf helvítis hjartað úr þér!"
 
 jom_expedition.41.t: "Handel z Irelandia"
 jom_expedition.41.desc: "opis"
 jom_expedition.41.a: "guzik!"
 
 jom_expedition.42.t: "Raid na Irelandia"
 jom_expedition.42.desc: "opis"
 jom_expedition.42.a: "guzik!"
 
 jom_expedition.43.t: "Green Pastures of the Faereyjar" 
 jom_expedition.43.desc: "Færeyjar rise from the grounds to meet us. One of the furthest territories of the Kingdom of Danes. This land, far from our Nordic homeland, was claimed from mysterious Papar when brave Scandinavian settlers arrived. Now Færeyjar harbors people whose language closely resembles the Old Norse speech. The islands here are sparsely populated; One is more likely to find the sheep that the land gained its name from than a human being. If we were to raid, we would have to turn our attention to the sea." 
 jom_expedition.43.a: "Maybe there's more to these rocks" 
 jom_expedition.43.b: "Time to hunt for some fish"

 jom_expedition.44.t: "Wolves in Sheep's Clothing"
 jom_expedition.44.desc: "Sometimes, even finding human dwellings is difficult here. The traditional færeyskr huts are made of stone and covered with a sod roof that imitates the grassy hills surrounding the dwellings. It makes them almost impossible to find from the sea, forcing the Vikings to travel deeper into the land. More visible locations, such as the town of Tórshavn, had nothing interesting to offer the Viking explorers, who opted to look for traditional craftspeople to trade with.\n\nOn the other hand, those living in villages and on the outskirts of civilization were of a reclusive nature, unwilling to talk to strangers. That was until the Vikings found one shepherd, who waved at them from a distance. He offered to sell them numerous wool coats as well as show them his production techniques. The Vikings asked about the grassy torfþak that covered his hut, hoping to use it when creating the camouflaged camps of their own. The old shepherd shared his knowledge with them, happy to have someone to talk to."
 jom_expedition.44.a: "The folk wisdom demands respect"

 jom_expedition.45.t: "The Horn of the Seas"
 jom_expedition.45.desc: "Realizing the cold stones on the Atlantic have nothing to offer, the brave Viking warriors decided to conduct a couple of tests. During this voyage, they had a doctor of ichtiology and cetology with them to record the measurements and results of their new invention - a special call horn that supposedly could influence the behaviour of fish and maritime mammals. The captain of the mission raised the peculiar instrument and blew it from the top of his lungs. Every member of the expedition covered their ears, but couldn't hear anything. There were also no fish following them. The captain blew the horn once again, and this time, a couple of dolphins appeared. They started attacking the ships, head-butting against them. Even jumping from the water, trying to push the Vikings overboard. The doctor said not to kill them, so the travellers had to pacify them with clubs and paddles. Having dealt with the maritime fauna attack, they were approached by the fishermen, who were awed at their prowess in dealing with such an attack. The local Faroese decided to enlist and swam together with the Carmine Sails back to Jomsborg."
 jom_expedition.45.a: "Project Njörðr: 5% completion"
 
 jom_expedition.46.t: "Dreams of the North Sea Empire" 
 jom_expedition.46.desc: "British Isles, the land of the Saxons, the Angles, the Jutes, and the Normans. The land of the English, the Scots, the Welsh, and the Irish. The land of the Vikings' ancestors. Great Heathen Army once ravaged these lands, and established the Danelaw, a region under Danish control and law. There are many historical sites and artifacts that remind the Vikings of their glorious past in these lands. One of them is the city of Jórvik, which was once the capital of the Danelaw and a major trading hub. But Jórvik was not the start. First came the raids on the monasteries, which were the most vulnerable and richest targets. Lindisfarne. That's where it all started. And that's where it can start anew. But in the modern world, the Vikings have to be more strategic and selective in their targets. London, or Lundunir in Old Norse, is the largest city in the British Isles and a symbol of English power and culture. It is also a major financial center and a treasure trove of riches and culture. However, it is also heavily fortified and defended by the British military, so the Vikings would have to be cunning and count on a miracle to pull off a successful raid on the city. It would be more reasonable to proceed there as traders, but the Jomsvikings are not known for their reason and pragmatism." 
 jom_expedition.46.a: "We come in peace" 
 jom_expedition.46.b: "Raid London"
 jom_expedition.46.c: "Raid Lindisfarne"
 
 jom_expedition.47.t: "Fish and Chips"
 jom_expedition.47.desc: "Jomsvikings decided to not follow into the footsteps of their ancestors and not raid the British Isles, but rather try to establish trade relations with them. Although they were met with suspicion by the locals, who were not used to seeing such strange and barbaric people, they managed to find some merchants who were willing to trade with them. But the real prize of the England was its naval power. The British navy is one of the most powerful in the world, and it would be a great asset for the Vikings to know how to build and operate such ships. The Jomsvikings were able to acquire some knowledge and technology from the British shipbuilders, which they could use to improve their own fleet and expand their raiding capabilities. However, the trade relations with the British were not very fruitful, as the Vikings were not very good at negotiating and trading, and the ended up getting ripped off on the car deals. But at least they got to try some of the local cuisine, which was not very impressive and made them question their decision to come to England in the first place."
 jom_expedition.47.a: "What is this shitty cat puke?"
 
 jom_expedition.48.t: "Belly of the Beast"
 jom_expedition.48.desc: "London, or Lundunir in Old Norse, is one of the largest cities in the world. It is also one of the most multicultural and cosmopolitan cities, with a rich history and culture. It is a major financial center and a hub of trade and commerce. Landing in such place with the intention of raiding it would be a daunting task, one certainly bound to fail. When the raiding party descended down in the Thames, they were met with a sight that was both awe-inspiring and terrifying. The city was bustling with activity, and there were so many people and buildings that it was hard to take it all in. Problem was with planning. The Vikings had no idea where to go or what to do in such a big city. They wandered around aimlessly, trying to find something to raid, but they were just overwhelmed by the sheer size and complexity of the city. They ended up getting lost in the maze of streets and alleys, and they were eventually caught by the British police. Policemen were stunned by the sight of the Vikings, but it didn't prevent them from citing them for trespassing and disorderly conduct. Each of the members of the raiding party was fined a small amount of money for the lack of licence for raiding. Sheer abstraction of the English policemen giving Vikings a ticket for raiding is enough to make the Jomsvikings question their life choices. Before the departure, party acquired some souvenirs from the city, such as t-shirts with the Union Jack and some London-themed mugs. And that's all they could get. And they're lucky to get away with only that."
 jom_expedition.48.a: "At least they got to see the sights"
 
 jom_expedition.49.t: "Highlands of Freedom" 
 jom_expedition.49.desc: "Scotland, the land of the Picts, the Gaels, and the Scots. The land of the brave and fierce warriors who resisted the Roman and English invasions for centuries. Also it was a target of Viking raids and settlements, especially in the northern and western parts of the country. The Vikings established several settlements in Scotland, such as the Orkney and Shetland Islands, and they also raided the mainland, especially the coastal areas. Now it's again free from English rule, and it is a potential target for the Jomsvikings to raid or trade with. However, the Scottish Highlands are also known for their rugged terrain and harsh weather, which could pose a challenge for the Vikings. Additionally, the Scottish people are known for their fierce love of independence and resistance to invaders, so the Vikings would have to be prepared for a tough fight if they decide to raid Scotland." 
 jom_expedition.49.a: "We have a very strange idea." 
 jom_expedition.49.b: "We should strike them."
 
 jom_expedition.50.t: "Whiskey in the Jar"
 jom_expedition.50.desc: "A Jomsviking trade party operating along the Scottish coast has concluded an unusual exchange with a local farmer, despite significant communication barriers caused by an exceptionally dense regional accent. The delegation had arrived intending to barter furs, amber, and preserved goods. Negotiations proved slow and uncertain, with both parties relying heavily on gestures and repeated nodding. Matters escalated when the farmer insisted on presenting his pile \"fookin jonk\" stored in his barn. Upon inspection, the structure was found to contain a large sea mine resting among hay bales and piles of other weaponry. The spherical device, fitted with protruding detonating horns, appeared intact and potentially active. After a local hit it with his rifle and prolonged silence from the Jomsvikings, they assessed the object's nature and possible worth. After some linguistic research and loosening tongues provided by few bottles of whiskey, a trade agreement was reached. The mine has since been transported to the Viking vessel under careful supervision. The exchange was successful, though questions remain regarding the origin of the device, its stability, and why it was being housed in some barn in a Scottish hamlet."
 jom_expedition.50.a: "Where on earth did he get those?"
 
 jom_expedition.51.t: "Monster Hunting"
 jom_expedition.51.desc: "There is a legend about a monster that lives in the Loch Ness, a large freshwater lake in the Scottish Highlands. The monster, known as Nessie, is said to be a large, long-necked creature with humps on its back. The legend of Nessie has been around for centuries, and there have been many reported sightings of the monster over the years. Some people believe that Nessie is a prehistoric creature that has somehow survived to the present day, while others think it is just a myth or a hoax. The Jomsvikings were not sure what to make of this legend, but they were intrigued by the idea of a monster living in the lake. They came to Scotland with the certainty of men who believed the world made sense. Coasts could be burned, monasteries looted, foes counted and named. Then the fog swallowed their ships and delivered them into a lake so vast and still it felt like a pause in creation itself. Loch Ness lay before them, black as ink. A shadow rose, vast and deliberate, folding reality around its spine. When Nessie emerged, time faltered. Helmets slipped from frozen hands. Men who had faced kings and storms felt suddenly, unmistakably small. This was no story made for firesides. This was something older than oaths, older than iron. The world, it turned out, still hid miracles in its darker corners. In reverent disbelief Podwawelska sausages with a four-pack of Kustosz Tequila Beer were laid out like offerings to gods. Her colossal head lowered, curious, gentle, impossibly real. The monster followed the scent of sausages, climbing from the lake with the patience of a god indulging children. With the last of the sausages held aloft, they led the living legend from the loch and across the sea, back to Jomsborg - raiding party was forever changed, knowing now that the sagas had not been exaggerations at all. The world was deeper than maps claimed, and some myths simply waited for the right fools to believe in them hard enough to take them home."
 jom_expedition.51.a: "I guess we have a new friend..."
 
 jom_expedition.52.t: "Land of Ice and Fire" 
 jom_expedition.52.desc: "Not counting some random monks, Iceland is the true jewel of Norse culture. First settled in the late 9th century by Norse seafarers, it stands as one of the most enduring outposts of early Scandinavian expansion. It was upon that volcanic island that chieftains established the Alþingi, formalizing law in a frontier landscape shaped by lava fields, glaciers, and isolation. Unlike many distant ventures of the Viking Age, Iceland was not conquered but settled, structured by governance and a peaceful society that was democratic in nature. The destination is viewed less as foreign territory and more as ancestral ground, a place where the sagas were written and preserved, where language and lineage endured with unusual continuity. Commanders describe the expedition as cultural and observational in character. No hostile intent has been declared. We can only learn from this voyage and perhaps recruit some willing to our cause." 
 jom_expedition.52.a: "Our ancestral land awaits" 
 
 jom_expedition.53.t: "Unraveled Heritage"
 jom_expedition.53.desc: "Upon arrival, the delegation prioritized contact with local communities and scholars rather than material exchange. Iceland's historical continuity from the Norse settlement period, including its preservation of medieval sagas and legal traditions rooted in the Alþingi, was cited as the primary focus of interest. The expedition secured several volunteer guides willing to assist in cultural orientation and instruction. Particular emphasis has been placed on linguistic study, with dictionaries and grammatical texts acquired to facilitate structured learning. There were some sessions organized aboard the longships and within temporary shore encampments, where comparisons between Old Norse, modern Icelandic and Jomsborg New Norse are being systematically examined. The mission's objective was educational in nature, aimed at strengthening cultural literacy and reinforcing historical ties rather than pursuing territorial or economic ambitions. Additionally, some people were recruited to come back with us to Jomsborg, as they wanted to join our cause in reviving Norse spirit."
 jom_expedition.53.a: "This is going very nice!"
 
 #do danelaw
 jom_expedition.54.t: "As once was, so shall be again"
 jom_expedition.54.desc: "Our ancestors thought beyond the horizon. They ventured into the unknown. Risking gods' wrath, they sailed into the stormy seas, seeking new lands. Ravens guided them, and the winds carried them. They found new shore. We are doing exactly the same. There was a coast. In there, we found it. Lindisfarne. The place where it all started. But there is nothing there now. The monastery is in ruins, the treasures are gone, the monks are long dead. There is a new church, but it is not the same. Doesn't have the riches. There's a castle nearby, but it's empty. We went to this place to find our roots, to connect with our past, to honor our ancestors. But we found nothing. Except, there's a museum. A museum that tells the story of the Vikings, but from the perspective of the English. It portrays us as barbarians, as invaders, as destroyers. It doesn't show our culture, our art, our achievements. It only shows the violence, the bloodshed, the plundering. It doesn't show the beauty of our ships, our sagas, our craftsmanship. It doesn't show the legacy we left behind. So, we decided to leave a mark of our own. Forge a new legacy. Even if it has to be in this place full of ghosts."
 jom_expedition.54.a: "That's a really nice-looking jar!"
 #
 
 jom_expedition.55.t: "Ghosts of Greenland" 
 jom_expedition.55.desc: "It's strange to think that Greenland was discovered by accident, and the Vikings were the first Europeans to settle it. Actually, not counting some inuit cultures that were sporadically settling the northern part of the island, Vikings were the first people that settled the south of Greenland. Only after the failure of their colonies, in 14th and 15th centuries - Inuits moved in and claimed the whole island. This makes Greenland truly viking land. Despite Danes and Norwegians reclaiming this island in the 18th century, the Norse population never came back in force. Now, it's in the hands of Americans, and they have militarized this island for their strategic purposes. Our expedition will be threading on very thin ice, not only due to the melting icebergs. We can head north towards the Pituffik Space Base, go directly for Nuuk or try to carefully bargain for some riches. Whatever we choose, it may go horribly wrong." 
 jom_expedition.55.a: "Try trading" 
 jom_expedition.55.b: "Nuuk"
 jom_expedition.55.c: "Pituffik"
 
 jom_expedition.56.t: "Greenland Trade Agreement"
 jom_expedition.56.desc: "A Jomsviking trading expedition seeking rare materials has reported sustained engagement near active mineral zones on the west coast of Greenland, where foreign companies are intensifying exploration of strategic elements including rare earths and other critical minerals. The contingent approached several activity hubs situated near known deposits of rare earth elements and critical raw materials, minerals that underpin technologies ranging from high-performance magnets to advanced electronics. Geological formations such as the Ilimaussaq complex have long been recognized for their unusually diverse and high-value mineralogy. The Jomsviking party secured samples of sought-after materials through barter, reflecting both the growing demand for Greenland's geological wealth and the island's evolving role in global trade networks. Analysts describe these developments as emblematic of Greenland's rising strategic importance in the supply of rare earths and other critical elements."
 jom_expedition.56.a: "At least we're getting something out of this."
 
 jom_expedition.57.t: "Painful Memories"
 jom_expedition.57.desc: "Expedition of the Jomsvikings to Greenland decided to sail straight into the heart of the icy wilderness, trying to raid the capital city of Greenland - Nuuk. Despite harsh conditions, they didn't expect any resistance as the city itself was not militarized. Unfortunately, as soon as they started their approach, they were met with American Coastal Guard patrol. During the engagement, US forces managed to call in reinforcements from the nearest base. Quick exchange of fire ensued, and the Jomsvikings were simply decimated, their ships sunk and the rest captured or killed. It appears that the Americans are not planning to show any mercy for the captives and they'll be lucky if they end up in the Guantanamo prison."
 jom_expedition.57.a: "Let's not try this again."
 
 jom_expedition.58.t: "New World" 
 jom_expedition.58.desc: "Vinland, Markland, and Helluland. These lands, reached by Greenlandic Norse explorers around the turn of the first millennium, represent the westernmost extent of documented Viking exploration. Helluland, widely associated with the barren coasts of Baffin Island, was described in the sagas as a land of flat stones and Arctic desolation. Markland, believed to correspond to Labrador, was noted for its forests and timber resources. Further south lay Vinland, remembered for milder conditions and wild grapes, and long associated with the archaeological site at L'Anse aux Meadows in Newfoundland. Our ancestors were the first Europeans to reach the New World, marking Norse people as the pioneers of exploration long before any expedition of Iberians. Unlike raiding ventures in Europe, these western journeys were exploratory and settlement-oriented, though ultimately short-lived. Environmental hardship, distance from Greenland, and conflict with Indigenous populations limited sustained Norse presence. We need to retrace the steps of our ancestors, but considering that we can presume what's waiting for us here, we might not need to limit ourselves to exploration and trade." 
 jom_expedition.58.a: "There are some curious riches in Vinland now!" 
 jom_expedition.58.b: "They will feel the wrath of sons of Eriksson!"
 
 jom_expedition.59.t: "New Treasures of Vinland"
 jom_expedition.59.desc: "A Jomsviking expedition operating along the eastern Canadian coastline has commenced negotiations aimed at acquiring uranium sourced from inland Canadian deposits. Framing the mission as a continuation of historic Norse contact with Vinland, commanders emphasized the symbolic weight of returning to lands once briefly settled by Greenlandic explorers. Unlike the timber and wild resources sought a millennium ago, the present objective centers on uranium, a mineral of considerable modern strategic value due to its role in energy production and advanced technologies. Preliminary contacts with regional intermediaries have focused on transport logistics, exchange terms, and secure handling procedures. Expedition leaders describe the effort as both pragmatic and historical, noting that while the original Norse presence in Vinland was short-lived, renewed contact demonstrates the enduring maritime reach of Jomsviking enterprise."
 jom_expedition.59.a: "What a nice shiny stone!"
 
 jom_expedition.60.t: "In Steps of Leif Eriksson"
 jom_expedition.60.desc: "A Jomsviking detachment has reportedly conducted a raid at the historic site of L'Anse aux Meadows, widely recognized as the only confirmed Norse settlement in North America. The location, currently maintained as a memorial and interpretive center, includes reconstructed structures, a visitor gallery, and a restaurant serving historically themed fare. According to reports, the detachment targeted the commercial facilities before removing a statue depicting Leif Eriksson. Witness accounts describe a rapid incursion focused on portable assets rather than structural damage. The statue, representing the early Norse voyages to Vinland, was transported to waiting vessels offshore. The symbolic irony of a Norse force raiding a monument dedicated to Norse exploration did not go unnoticed. Canadian authorities have yet to issue a formal response."
 jom_expedition.60.a: "This belongs in a museum!"
 
 jom_expedition.61.t: "A Visit to Ny-Jorvik" 
 jom_expedition.61.desc: "Ameríka... Named after Amerigo Vespucci, who realised that Europeans discovered a completely new continent, as opposed to Christopher Columbus, who thought he discovered part of Asia. Had the true discoverer of the continent been honored, the Vikings would be heading towards Leifland. Here, people built their unimaginable wealth. Wealth that should belong to us. We shall take it, willingly or by force.\nThey already swam under the Brooklyn Bridge and were welcomed by the Statue of Liberty and the poem that was written on its pedestal:\nGive me your tired, your poor,\nYour huddled masses yearning to breathe free." 
 jom_expedition.61.a: "Breathe free we shall" 
 jom_expedition.61.b: "The dream has rottened. Time for the axe of justice"
 
 jom_expedition.62.t: "Nordicmen in New York"
 jom_expedition.62.desc: "The financial elite was weirdly ok with the arrival of the Vikings. More than the Vikings themselves, actually; Most of the travellers from Europe didn't understand the financial system or abhorred its unjust nature. Usually both. Nevertheless, they were welcomed by one of the brokers, who said he was also passionate about Minnesota football, whatever that was supposed to mean. He agreed to expand his company to Vendland, improving the effectiveness of the production process there."
 jom_expedition.62.a: "Where is this Minnesota, anyway?"
 
 jom_expedition.63.t: "#DespoilWallStreet"
 jom_expedition.63.desc: "The Vikings set flames to Wall Street. Together with local communists,  socialists, anarchists, and regular angry people, they started plundering the banks, taking the money, forcing the stock brokers to hand them their action at the threat of violence. Having incited a true protest, they also got into a fight with the Police. They rode on the famous bear and the bull statues before removing them from the ground in order to melt them into regalia and jewelry. Before they left, they set up a camp in Central Park, where they regrouped."
 jom_expedition.63.a: "Ah, the most direct method of taxation!"
 
 jom_expedition.64.t: "Temptation of Bandarikin" 
 jom_expedition.64.desc: "The Vikings swam up the river Mississippi - Father of Waters. There, they found the locals. Mississippi is one of the poorest states in the Bandarikin. Despite last years' growth, many are still unemployed and live in inhuman conditions. However, they possess a warrior's spirit and are skilled in using ranged weapons. Overpopulated, land of fighters from an agricultural land - sounds like the Vikings of the modern day! All they lack are ships." 
 jom_expedition.64.a: "Handelhandelhandel" 
 
 jom_expedition.65.t: "Redneck Vikings from Hell"
 jom_expedition.65.desc: "At first, the locals were uneasy when the aliens introduced themselves as the Northmen, but they soon realized we had nothing to do with the Union they were talking about. Few had some axes, but little prowess in using them as a weapon. They were much more familiar with firearms and showed their skill during the training session. Afterwards, they invited the Vikings to a celebration dinner. Unfortunately, they only served regular venison, unsuitable for the vegetarians among the Vikings. Their moonshine was stronger than the regular mead of the Norse, but it was nothing the brawny warriors couldn't handle. To further grace the event, the Vikings sang their sagas with banjo accompaniment.\nThe next few days were spent by the locals trying to repurpose their pick-up trucks as boats."
 jom_expedition.65.a: "Yeeehaw!"
 
 jom_expedition.66.t: "Break the Chains!"
 jom_expedition.66.desc: "The Guantanamo Prison - the cruel institution, born out of the terrorist panic of the early 21st century. The prisoners are kept there with little supervision from the outside world. Bandarikin's private playground on foreign territory. People there are brave warriors detained unlawfully, being denied both freedom and honorable death. They hate Western capitalism just like the Vikings and are calling for help to free them from this den of torture. The Norseman will answer the call!\n\nThey tried to perform a quick naval landing to incite the prisoners' rebellion that would grant them liberty. The invaders were initially successful due to their boats' small size and the lack of reliance on detectable complex technologies, but once the guarding soldiers realized what was happening, they mustered ships of their own, which made short work of the Viking ships before a single Viking set foot on the bay's beaches."
 jom_expedition.66.a: "We shall return for you, brothers!"
 
 jom_expedition.67.t: "Vikings of the Caribbean" 
 jom_expedition.67.desc: "Free from the bleak waters of the Baltic and the Atlantic, the Vikings could finally enjoy the look of the azure waters of the Caribbean Sea. Here were the hideouts of legendary pirates that plundered the ships sailing from and to the New World. Times have changed, and now the Atlantic Ocean is well-guarded, but perhaps the valiant Viking effort can revive the age of piracy in the area. Perhaps they may find some lost treasures? If not, perhaps they can have some time off on one of the tropical islands. There was also the question of freeing the prisoners of Guantanamo, held there by the greedy, tyrannical regime of the Bandarikin." 
 jom_expedition.67.a: "Let's make contact with fellow socialists" 
 jom_expedition.67.b: "We shall find the Fountain of Youth!"
 jom_expedition.67.c: "We shall free the oppressed of Guantanamo!"
 
 jom_expedition.68.t: "Viva la Cuba"
 jom_expedition.68.desc: "The fellow socialists in Cuba warmly welcomed the Vikings. They had a giant fiesta held in their name, though none of the locals were convinced to join the fight against capitalism in Europe. Instead, they served as guides during the famous Parradas carnival, where the travellers could experience the Cuban music and admire colorful floats, dancers with fantastic costumes, as well as the flag-wavers. During the night, the lights created a magical atmosphere as the fireworks lit the skies.\n\nAs the parting gift, the locals sent the famous Cuban cigars and, having heard of the Northmen's problem with scurvy due to lack of vitamins, added a container of oranges to sweeten their journey back.\nThe Vikings left in good spirits, sure that different politics is truly possible"
 jom_expedition.68.a: "Venceremos! Við Munum Vinna!"
 
 jom_expedition.69.t: "The Trial of Ponce de Leon"
 jom_expedition.69.desc: "The Vikings hopped from one Bahamian island to another, hoping that their effort would find the legendary Fountain of Youth, which would grant them the blessing of Idunn. To their dismay, the Bahamas has been more or less inhabited. Each jungle they found more or less untouched disappeared after a few swings of their swords. The uninhabited islands were too small for a water bubbler, let alone a mythical fountain.\nTheir hearts skipped a bit when they found an old underground smuggler hide-out, believing maybe the treasure they've been seeking was hidden there for centuries. They sent a search party there, which was only able to find a stash of 17th-century rum. There was only one rational reason for their failure..."
 jom_expedition.69.a: "The rich elites stole the Fountain for themselves!"
 
 jom_expedition.70.t: "Halls of Montezuma" 
 jom_expedition.70.desc: "The lands of Mexíkó have for a long time been subjugated to the Christlovers occupation. Yet, even after all this time, people living here still pay respect to their old traditions, and the mysteries of the ancient Aztecs remain unsolved. One such mystery is the supposed existence of the Montezuma treasure - the gold the Aztecs hid when their Tlatoani was held for ransom by the Spanish conquistadors. The jarl himself took an interest in the legend, hoping the treasure would include a golden calendar that would reveal the day of Ragnarok. Yet this whole thing could be a myth. Perhaps it would be better to focus on the present and make contact with the cartels, which could bring the Vikings more tangible benefits." 
 jom_expedition.70.a: "Time to talk with the Cartels" 
 jom_expedition.70.b: "Ég ríf helvítis hjartað úr þér!"
 
 jom_expedition.71.t: "Baby Blue"
 jom_expedition.71.desc: "When they started talking about 'Los Conquistadores', most people ran away, not wanting any trouble. It took some time to find someone who wasn't quick enough to catch and beat some sense into him to make him tell where they could find a drug supplier. Finally, this led to the local gang leader subservient to the cartel. He said he didn't like the way they've been carrying themselves around his town. The Vikings asked if he liked the gold they've been carrying with them, throwing a bag of money on his desk. The drug boss lightened up and offered Vikings his special\n\nLater that night, the two warriors snorted lines of the newly bought methamphetamine and engaged in the longest axe duel the Vikings present there have ever seen."
 jom_expedition.71.a: "Tight shit!"
 
 jom_expedition.72.t: "The End of Time"
 jom_expedition.72.desc: "After reading through countless fake maps and talking to local witches, the Vikings headed towards northern Mexico, to a place called Huápoca. The subjects of Montezuma II hid the treasure far beyond the borders of the Aztec Empire. So far, a few of the travellers fought; they were chasing tall tales and fairy tales. Nevertheless, the orders were clear, so having chased away the nagging archaeologists, the carmine explorers began an excavation of their own. They struck their pick everywhere, but besides old stone Mogollon huts, there was nothing visible to even catch their interest. In his desperation, one of them started to strike at the walls of the mountain, the pre-Columbian inhabitants. Having been afraid of Jarl's wrath, they, the others, helped him out. Despite their scepticism, the seemingly natural mountain wall collapsed, revealing the hidden hall. At the end of it, there was a door with some god's face on it. No pickaxe or explosive that the Vikings had could open it. Despite not knowing the language, the pictograms made things clear. Those who want to enter must sacrifice a person by cutting out their heart to gain entry. An old, robust warrior went forward. He knelt and unshethed his knife and carved out his heart, placing it in the mouth of the god before drawing his last breath. The door opened, revealing a mountain of golden coins and a legendary calendar."
 jom_expedition.72.a: "The mysteries of Asynjur will be ours"
 
 jom_expedition.73.t: "Sons of Bolivar" 
 jom_expedition.73.desc: "Before us, stretch the highlands and jungles of Venezuela, Colombia, Guyana. Venezuelans are fellow Marxist regime, or at least so they appear. If we trade with the fine folks of those lands, jovial and content in life despite its hardships, we will earn oil. Sulfuric, heavy, crappy oil, but oil nonetheless. Colombia also has a budding... space program. If we raid them, we can obtain rocket technology that will not be easy to obtain otherwise." 
 jom_expedition.73.a: "Let's get that oil, surely they'll have no choice but to sell it cheap." 
 jom_expedition.73.b: "Ég ríf helvítis hjartað úr þér!"
 
 jom_expedition.74.t: "Venezuelan Black Gold"
 jom_expedition.74.desc: "Our tankers are filled and we set sail. Most of the oil is being refined in Venezuela itself, with our tankers picking up ready fuel and bitumen. The rest is moved to Curacao, where a local refinery jumps at opportunity to run at capacity for once. The deal is affordable and will ensure fuel security for as long as the shipping lanes hold."
 jom_expedition.74.a: "Thanks, Maduro!"
 
 jom_expedition.75.t: "Attack on Bogota"
 jom_expedition.75.desc: "As expected, the space research is lightly defended, and we waste no time hacking the computers for schematics and stealing documents. We even kidnap some scientists for... consulting. Our diversionary teams have ignited flashpoints of cartel activity to occupy the police with, so we have a fine window before response is made unbearable. Our servers receive the data in mere minutes, and with that, Jomsborg celebrates."
 jom_expedition.75.a: "Frá rógi til stjarna!"
 
 jom_expedition.76.t: "Brazilian Sirens" 
 jom_expedition.76.desc: "The South American Atlantic shore greets us with an unfamiliar warmth, brought in part by the warm Brazilian Current, but even more so by the lively sight of its inhabitants. The beaches are a place of constant leisure and celebration. The vibrant music, loud enough to be heard on our longships, further adds to the atmosphere. The temperature must be doing something to our heads, as we can't bring ourselves to attack these people. We can, however, maintain our resolve and sail south to waters more similar to those of our homeland. There, we can raid and pillage to our hearts' content." 
 jom_expedition.76.a: "Let's hit the beach. A day off is long overdue." 
 jom_expedition.76.b: "We must resist this temptation. Sail south. Make the Jarl proud!"
 
 jom_expedition.77.t: "Beach Day"
 jom_expedition.77.desc: "When the Viking flotilla landed on the eastern edge of the Copacabana, barely anyone cared enough to notice its presence, except for a few tourists begrudgingly forced to move their towels to avoid being hit directly by the bow of one of the longships. After a brief look around, Jarl Halfdan's men removed their armor to manage the sweltering heat, and soon, they were nearly impossible to discern from the hundreds of beachgoers playing and resting in the afternoon sun, except for their lack of a tan. In a rather unsurprising result, the experienced berserkers easily beat a team of young Vikings 21:9 in a game of beach volleyball, while Snorri forever lost his honor by almost drowning after a particularly large wave dragged him further back into the water. Once the sun began to set, the crew set out into the local market. Though they didn't have the appropriate currency, they were able to barter for a couple of shiny stones, jewelry, and good luck charms of seemingly mythical origin, or at least that's what the salesman claimed. The atmosphere was so jovial that nobody bothered to ask just how exactly these so-called 'amulets of Thor' ended up on the Brazilian coast."
 jom_expedition.77.a: "Surely they're authentic, right?"
 
 jom_expedition.78.t: "Second Falkland Crisis"
 jom_expedition.78.desc: "For days upon days, the Vikings sailed across the coast, trying to shake off the peaceful emotions still clinging to them after the earlier encounter, until finally, they found it. The Falkland Islands looked exactly like home - cold, empty, unwelcoming. In an instant, all the memories of looting the Baltic and North Sea coasts came back, and with a fierce war cry, the Vikings headed straight for the remote archipelago's shore. On the way, they ignored the numerous vessels issuing warning signals, sailing past them in such a single-minded hurry that they had landed before any shots from the stationed fleets came. Having disembarked on the tip of the western island, far from any notable settlements, they looted the one farmer's shack in sight, killed all inhabitants, plundered their sheep, and set off, content with another successful raid. Unbeknownst to the Viking crew, a missive was already being sent to the Argentine ambassador, demanding answers for the attack. A few hours later, seeing the situation as a sign of unpreparedness on their rivals' part, the bulk of the South American nation's navy headed for the islands, hoping to once again take them over before the Brits could muster a response."
 jom_expedition.78.a: "Maybe this time, they'll be more successful."
 
 jom_expedition.79.t: "Lost Treasures of the Incas" 
 jom_expedition.79.desc: "The Mighty Andes hold many secrets. There are hidden treasures beyond imagination. That is, if the legends made up to get as many explorers and colonists as possible are to be believed. The chances are slim, but if there is a hidden treasure in some cave or lake, why not try it? There's also the option of interacting with humble Andean herders and learn from them about how to survive in the inhospitable mountains." 
 jom_expedition.79.a: "Time for some leasure" 
 jom_expedition.79.b: "We shall recover the Incan gold"
 
 jom_expedition.80.t: "The Puffy Cavalry"
 jom_expedition.80.desc: "Not every expedition has to end with great riches. Sometimes fresh mountain air and contact with nature are all that one needs. In the Andes, the Vikings found Alpaca herders to be most accepting of the outsiders. The mighty explorers took a moment of respite with the mountainous animals. They fed them, petted them, soothing their psyche after numerous raids. The Vikings asked by their translator if they could be mounted, the Peruvians answered that they usually can't due to their fragile physique. Only the lightest of the expedition members, usually women, could ride the alpacas with some effectiveness."
 jom_expedition.80.a: "Every little bit helps"
 
 jom_expedition.81.t: "Mystery of the Incas"
 jom_expedition.81.desc: "The tall Andes proved more than an equal challenger for the Vikings. The slopes were slippery, and the dry, strong Zonda winds didn't help. Of course, the treasure they were looking for wasn't hiding in plain sight, so they had to descend deep into the caves. The underground tunnels provided shelter as well as the promise of riches. They ventured deep into them, listening to the cold drops of water accompanying the sound of their steps. Still, they found no indication of a great treasure. That was until one of the Vikings leaned against one of the unsuspecting stalagmites. The rock formation moved like a lever, making a rock wall open like a door. The Vikings entered the corridor hoping to find treasures. After a few steps, one of them was hit in the neck with a poisonous dart. Apparently, the floor was riddled with the pressure plates that activated the traps. At the end of the tunnel, there was a set of strings resembling a traditional quipu record-keeping system and an Inca calendar. The task seems to tie the knots to make them correspond with the Inca holidays. After numerous trials and errors, the correct set was put into the slit in the wall where the knots were supposed to go. The doors opened and revealed numerous coins, figurines of both animal and human faces, and even crowns."
 jom_expedition.81.a: "I wonder how the Incan crown would look on Jarl's head"

 jom_expedition.811.t: "The Stone Giants"
 jom_expedition.811.desc: "The barren grassy surface of Easter Island had little to offer, besides the mysterious Moai head sculptures. That was the best option to get your name in the future saga. The other option was an ephemeral treasure or raiding for the animal you can find in the pet zoo. The choice was pretty simple. So was accomplishing the task. The Vikings swam during the night, overpowered the coastal guard, pulled the giant head on the manual track, and transported it on the barge.\n\nThe Jarl was more used to more glittering loot, and the Vikings made a plan to ensure their sovereign approval. Once on a friendly land, they contacted a sculptor who was willing to do some shady business. The Vikings wanted him to make the Moai they stole resemble their beloved jarl. Not only will it make Sandbjerg more likely to cherish the gift, but it can also serve as a piece of propaganda."
 jom_expedition.811.a: "Almost as big as the real thing!"
 
  jom_expedition.82.t: "Home of the Normans" 
 jom_expedition.82.desc: "Here in Northern France, the travelling Vikings made their arguably most successful state. Starting as a mere vassal of the King of Franks, it would lay the groundwork for the modern kingdom of England, which would later turn into the largest empire in history. Some of the explorers treat this land as promised to the Norsemen and want to settle here in peace. Others think it's abhorrent that the modern states of the United Kingdom and France, which lost their Nordic or Germanic roots long ago, usurp the right to the Norman legacy." 
 jom_expedition.82.a: "Let's see if we're welcome here" 
 jom_expedition.82.b: "We will show them their true ancestry"
 
 jom_expedition.83.t: "Coming Home"
 jom_expedition.83.desc: "The emotion that the explorers felt at the sight of the shores of Normandy was too much. Here, Viking Rollo carved his realm; here the allied forces landed to free Europe from the False-Germanic tyranny of the Nazis. With tears in their eyes, the travellers from Jomsborg knelt to the ground and knew they didn't want to go any further. They filled out the forms to become French citizens and decided to settle at the outskirts of Rouen. They have not forgotten their mission, however. Their peculiar way of life attracted most attention during regional fairs. They used that recognizability to promote the ideas of the Carmine Jarl, promoting his ideology, creating a friendly French lobby, and even inspiring some French to travel to Jomsborg."
 jom_expedition.83.a: "Let's call it grass-root raiding"
 
 jom_expedition.84.t: "Raid na Normandia"
 jom_expedition.84.desc: "The Bayeux Tapestry. The greatest proof of the Norman valiancy. And where is it situated for the world to admire? Usually, in France, which has forsaken its Germanic heritage, or from time to time in England, they allowed their language to be colonized by the bastard of Latin. The Vikings are the true inheritors of Vilhjalmr the Conqueror.\n\nThe thing itself was simple; the Bayeux museum was no Louvre. After taking out the guards, the Vikings gazed at the 70-meter-long tapestry, wondering how they would transport it. They grabbed a few conscious custodians and ordered them to 'pack' the embroidery. The French placed it in an acrodeon-like screen, so the cloth could be folded and transported unharmed."
 jom_expedition.84.a: "Good we don't have to cut it to move it"
 
 jom_expedition.85.t: "Paris" 
 jom_expedition.85.desc: "Paris is a city so full of itself they will believe themselves the City of Lights even when it goes bankrupt and we loot the rest of it. We won't loot all of it though, it's too big, credit where it's due. But we will raid Louvre, a place jam-packed with opulence and wealth. Failing that, one of our brothers has a connection that could get us a pretty killer truck deal." 
 jom_expedition.85.a: "Trucking vikings? I've heard worse." 
 jom_expedition.85.b: "Ég ríf helvítis hjartað úr þér!"
 
 jom_expedition.86.t: "Parisian class trucking"
 jom_expedition.86.desc: "In essence, we now have services of a 'multicultural team of different religions and beliefs' in trucking business. Which is to say, we might as well talk to them in Algerian. No matter: They can sell us trucks and fix our old ones, upgrading our fleet bit by bit to make our vehicles more suited for post-Fall environments. We just had to pay them enough for them to retire under French law (easy) and move them to Jomsborg while maintaining their eating habits (very hard)."
 jom_expedition.86.a: "Parisian pizazz in action"
 
 jom_expedition.87.t: "Parisian Class Struggle"
 jom_expedition.87.desc: "As any proper socialist viking does, we have raided Louvre museum/palace and made it out with everything that's not nailed to the floor. Axes flew, were swung, and drank Parisian blood, while our guns took care of the rest and our incognito trucks were making it out with the goods. We didn't have to flee far: France is rife with an underworld of fencers that bought the loot off of us at a very reasonable price. With bitcoins enough to buy out Societe Generale, we've came home as warriors and skalds alike, extolling our raider class struggle, knowing the French worker is right by our side, even as the French bourgeois government scrambles to avenge the French pride in United Nations."
 jom_expedition.87.a: "I told them to not sell the Sun King's portrait!"
 
 jom_expedition.88.t: "Iberia" 
 jom_expedition.88.desc: "Spain is a tenth global economy and a fine place to trade as any, but there is also a lot of history to be looted here. Santiago de Compostela, for one. One of the most visited pilgrimage sites and a nexus of wealth to obtain in footsteps of our monastery-raiding ancestors. Which viking could ever resist the allure of our own kind of pilgrimage there?" 
 jom_expedition.88.a: "Surely Spain has more to offer through trade..." 
 jom_expedition.88.b: "Tell Apostle James we're coming for him!"
 
 jom_expedition.89.t: "Trade with Iberia"
 jom_expedition.89.desc: "Not much eventful could be squeezed out of opportunities there, but we managed to hire some experts in shipbuilding and training for small-scale tactical operations. They'll prove instrumental in maintaining and launching raids in the future."
 jom_expedition.89.a: "Good find!"
 
 jom_expedition.90.t: "The Pilgrimage to Santiago de Compostela"
 jom_expedition.90.desc: "They were ready for us. I would not believe it if I saw it for myself, fireteams of robed, Capirote-toting monks, clearning out the Cathedral from civvies, opening fire as soon as they see our banners and armors. And their leader... something else. His Capirote was metal, adorned with thorns, he had a metal mask in place of face, and armor covered in rags. A sword, ornamental, that may or may not have deflected bullets, and sure seemed meant to parry our axes. Many brothers fell, but we broke through, responding to mortar and gunfire with the viciousness and envelopmnent of our own. They retreat into the cathedral, which becomes their last stand. This is a site of some of the holiest relics of Christianity, we are NOT gonna relent no matter the cost. The bones of the Apostle James will be ours, I roared. The leader with his sword was there. 'Make my chest hurt with regret. Forge your punishment and nail it deep', he said. I swing at the madman and he sidesteps, jumping like it was a platformer game and performing a plunge attack. Baleful energy surrounds the sword's thorns. In the end, one of our SMG gunners put him down with a full auto blast before he can shishkebab me: He already cut off the shaft of my axe. We take what looked like the relic of the Apostle, bloodied and near-dead, and scurry away. We have plenty of valuables taken from the cathedral as well, works of art mostly. Triumph. And yet.. the road back is heavier than any pilgrimage. 'Odin, why have you forsaken us?', we moan, tasting vinegar somehow. We almost dare not open the casket of the bones, but we are sons of the North, irreverent and mighty, so we open. The bones... are plastic in touch. Or wax! This cannot be. Someone turns on the radio, which insists the ...real, bones of Apostle James were hidden and protected succesfully. What we captured is a decoy... with an mp3 player. We hit play. It says..."
 jom_expedition.90.a: "I curse you forever in name, I bless you forever in death."
 
 jom_expedition.91.t: "Riches of Sikiley" 
 jom_expedition.91.desc: "Times have changed since the last time the Norsemen traveled to Sicily. The warm temperatures and the azure sea remained the same, but economically, the island struggled. It stopped being the center of trade once the New World routes appeared, marginalizing the importance of the Mediterranean. Then came the over-reliance on agricultrue with the lack of industrialization as a result of the neglect of the greedy northern elites. This neglect was created by the undesirable element - the mafia. The Viking party is split on how to deal with them. Some respect them for their strength and how they adapted, and want to learn from them. Others think they're detestable oppressors" 
 jom_expedition.91.a: "There's too few of us to make a difference." 
 jom_expedition.91.b: "Time to bring order back to the island"
 
 jom_expedition.92.t: "The Rule of the Strong"
 jom_expedition.92.desc: "The Vikings took some odd jobs from the local mafia boss. They mostly served as mascot-bodyguards in the clubs, protecting the doors and attracting attention simultaneously. They also collected loans from people desperate enough to do so. There, they learned many effective 'interrogation techniques'. It was something of a revelation to them. Usually, when the Vikings resorted to violence, the prisoners ended up dead. Now they realised there was a world of possibilities around them. They took notes as the mafia goons performed waterboarding, electrocuting, and denailing. The mafiosos showed them so much, the Norse wanted to teach them some execution methods. The locals took a great liking to the bloody eagle method."
 jom_expedition.92.a: "That's how mafia works"
 
 jom_expedition.93.t: "The Standoff"
 jom_expedition.93.desc: "One of the mafia goons was harassing a woman in the dark alley, trying to force her to pay. He raised his baseball to strike at her, but couldn't. Not because of moral reasons. At least not the moral reasons of his own, he turned his head and noticed a 2-meter Viking standing behind him, holding the baseball in place. The Viking punched the mobster in the gut, that sent him flying. The woman fled the scene screaming. The giant leaned over the gangster and, with broken Italian, asked him where his boss was.\n\nThe mob boss was having a dinner with his accomplices, having the time of their lives, gourging themselves with baked duck and sipping the best wine the money could buy. Their party was stopped by the noises of a fight coming from behind the closed doors. When they saw blood leaking from the door slit, they knew what was going on. The bodyguards uncovered their hidden machine guns and pointed at the door, expecting the attack. Instead, the window behind them suddenly exploded, letting the Vikings jump from the outside with the help of the lines. Then the massacre and looting really began."
 jom_expedition.93.a: "Shame we have to leave"
 
 jom_expedition.94.t: "The Eternal City" 
 jom_expedition.94.desc: "The beautiful, Rome. Once the capital of the known world, it still remains of great importance due to being the seat of the head of the Catholic Church. And those golden beaches, exquisite cuisine, and marvelous landmarks such as the Colosseum, St. Peter's Basilica make the city the prime location for leisure after a long and dangerous sea journey. At least that's what half of the party thinks. The others who delved deep into the Nordic lore remember that once the Vikings plundered the city. At least that's what they thought. In truth, they unknowingly raided Lumi, mistaking a simple town for the Eternal City. They think such a blunder should be remedied, otherwise the Vikings will be remembered as a laughing stock." 
 jom_expedition.94.a: "Let's live a little" 
 jom_expedition.94.b: "No one will laugh at the Vikings"
 
 jom_expedition.95.t: "True Treasures of Italy"
 jom_expedition.95.desc: "The Vikings had a great time trying various delicacies of Rome. They ate numerous pastas and pizzas, as was to be expected, but their warriors' appetites were could only be truly quenched with steaks such as rare Bistecca alla fiorentina. They also took great liking to Brodetto di pesce - a fish soup with lots of tomatoes and added wine. They were wondering how it would taste with the Baltic fish and mead instead of wine. They ordered a lot as a takeaway to bring back home in the boxes and containers, so 'everyone in Jomsborg could have a taste of Italy'. Tom and they made their journey more enjoyable, they also ordered a lot of Arrosticini as a boat snack."
 jom_expedition.95.a: "Mamma Mia"
 
 jom_expedition.96.t: "Better than Vandals"
 jom_expedition.96.desc: "The Northmen swam down the Tiber River to sneak into the Vatican. They barged into the Apostolic Palace. The grey and brown Vikings in furs attacked spear-wealding colorful Swiss Guard. The white halls reddened with blood. They captured Pope Leo XIV and took him hostage to lead them to the Vatican treasury. There, they took the golden, Byzantine Crux Vaticana, Papal Tiara (they didn't consider it a theft, as the Pope had been using it), as well as numerous chalices and other relics.\nThen in the Sistine Chapel, they had their native Nordic celebration, drinking Mass wine, dueling, and feasting, dirtying the marble floor with grease and blood. They threw the meat into the fire, thanking their gods for their success."
 jom_expedition.96.a: "In the name of Odin, Thor and Freya"
 
 jom_expedition.97.t: "Gibraltar" 
 jom_expedition.97.desc: "Njorvasund is a straightforward affair. It's a fortified strait guarded by army and worse. We can't raid it unless we don't desire entering the Mediterranean without going around Africa. Leaving us with negotiating a deal for safe passage, and a few side barters." 
 jom_expedition.97.a: "Let's do this then" 
 
 jom_expedition.98.t: "Passage secured"
 jom_expedition.98.desc: "We can now come and go as we please by paying flat subscription fee to the Gibraltar authorities. Turns out they can be pretty openminded of vicious LARPy raiders if you can pay. Money talks and battleaxes take the bus. And for our tonnage and cargo, the rates are competitive."
 jom_expedition.98.a: "Hopefully they don't have friends among those we raid..."
 
 jom_expedition.99.t: "Twilight of the Gods"
 jom_expedition.99.desc: "The sea has grown silent in a way I have never known. Even storms feel alive, but this white horizon feels like the edge of a thought not meant for men. We sail toward Antarctica, though I call it by another name in my heart - the Threshold. I am certain of it now. If the world has a gate to Asgard, it must stand here, beyond maps, beyond lords, beyond all quarrels of Midgard. The sagas speak of Bifröst blazing between realms. Why should it not descend upon the last untouched land? Ice like polished bone. Mountains hidden beneath frozen oceans. A continent veiled, as if deliberately concealed. Something must be there. And it's been calling to us. We made landfall three days past. The cold is not merely temperature - it is presence infesting our minds. It presses against the lungs and listens. The sky burns pale even at night, and the wind speaks in a tongue older than runes.\n\nYesterday, while scouting inland across a shelf of wind-cut ice, we saw metal. At first I thought it was a trick of light, a glint beneath snow. But it was no relic of whalers nor scientists. We uncovered a hatch, sealed and marked with symbols no saga ever mentioned but which every history book has cursed. Hooked cross. And with it a hidden base, buried since the last great war. Inside, warmth. Power. Machines humming like captive thunder. More advanced beyond anything we know. And we're not alone.\n\nThey stared at us as if ghosts had breached their sanctuary. Pale uniforms preserved in sterile corridors. Emblems from a fallen Reich. They had not fled the world - they had hidden beneath it. Advanced craft rested in hangars carved from ice, circular vessels of polished metal, like shields shaped for flight. Flying saucers. Real ones. Their leader spoke in astonishment when he saw our banners and heard our speech. He muttered in German about destiny, about Aryan blood returning to its source. He believed we had come to join them, that Norse sons had finally found the hidden spearpoint of history. We are Jomsvikings, yes - heirs to a northern past - but not to the madness of supremacy. Our oaths bind us to brotherhood, to shared strength, not to delusion wrapped in race. Their obsession with purity felt small in that vast ice hall, smaller still beneath the sky we had just crossed. They tried to persuade us. They showed us their craft, their engines, their impossible weapons. They spoke of a coming return, of reclaiming a world they believed inferior.\n\nWe answered with blood and axes.\n\nThe fighting was swift and brutal within the steel corridors. Fire met frost. The hangar rang with gunfire and the crash of shattered machinery. One of their discs ignited and tore through the ceiling in a blossom of light before collapsing into the snow above. By nightfall, the base was silent but for the wind reclaiming its entrance. There was no gate to Asgard beneath the ice. Or perhaps there was. Not in gold halls or rainbow bridges, but in the choice made today. The gods did not reveal themselves in glory. They revealed themselves in judgment. We earned the seats in Valhalla by claiming lives or the biggest enemies we could ever face."
 jom_expedition.99.a: "We should definitely not talk about this ever."
 
 jom_expedition.100.t: "Greece" 
 jom_expedition.100.desc: "Birthplace of civilization, some call it. We call it birthplace of the kind of civilization we derive our culture from only secondarily. We'd much sooner look to North than Olympus. But they're fair sailors like us, and might teach us something about shallow water tactics yet. Or we do our gods proud, and thieve their precious erstwhile idols from under their noses, in a true Odinssey." 
 jom_expedition.100.a: "Give the sailors our regards" 
 jom_expedition.100.b: "Give the gods, their graven images!"
 
 jom_expedition.101.t: "The New Odyssey"
 jom_expedition.101.desc: "We sail the seven islands with Greeks and in exchnage for our many trinkets we learn a lot. We can run naval trade more effectively now, but we also learned plenty about shipbuilding. We bought new shipyard equipment and software, which should make for good improvements on our merchant marine."
 jom_expedition.101.a: "Three thousand years of naval tradition, ours."
 
 jom_expedition.102.t: "The New Illiad"
 jom_expedition.102.desc: "The best part of our raid was our decoy. First our social media suffered strategic leaks about us intending to hit Mount Athos, and a few other monasteries. Some of our lesser teams were indeed going there. Conspicuously. But while they caught flak from local and state security, we were on a museum spree all over Parthenon, no admissions fees paid. Whatever ancient trinkets they had, we took. Their old gods became tributes to ours. One of our teams even made it to Mount Olympus, but only found a Christian monastery there. We came home heavy with history nonetheless."
 jom_expedition.102.a: "If only we had the air power to lift Parthenon to Jomsborg..."
 
 jom_expedition.103.t: "Miklagard" 
 jom_expedition.103.desc: "Ah, the Bosphorus. Something stirs inside us at the sight of those straights. Beyond the Dardanelles lies the great city of Constanti... Istan... Miklagard. Much has changed since the last time our vessels visited the area, but the Empire stands eternal, yet under a different management. In our absence, the Turkic tribesmen have taken over the city of the world's desire and transformed it into their own image, reducing the Greeks to a rump state centered in Attica. As the heirs of the mighty Varangians, we are bound by the oath to serve and protect the Emperor. Are we to recognize the legitimacy of Miklagard's new masters, or should we carry out a brutal reprisal in the name of the fallen Byzantines?" 
 jom_expedition.103.a: "The Sultan will appreciate our protection!" 
 jom_expedition.103.b: "We must remain loyal to the Basileus! Attack!"
 
 jom_expedition.104.t: "Varangian Spirit"
 jom_expedition.104.desc: "Landing at the tip of the Golden Horn, the confused Vikings initially went about harassing the local populace, demanding an audience with the Emperor. Things were about to turn violent, as rage boiled inside the Berserkers at every confounded glance of the inhabitants, unable to understand their particular blend of faux Norse, until an intervention by the available law enforcement suddenly diffused the situation. The Vikings let themselves be captured, and their case was slowly transported up the levels of authority, from the local police chief to the mayor, then through the central government, and in a few days, the warriors were sitting in the presidential palace in Ankara, pleading their case before the Sultan of all Anatolia, Imperator of Byzantion, among many other titles they styled the unassuming, crownless man as. The Vikings were a strange bunch, and their axes might be a bit less effective nowadays than a thousand years ago, but after long negotiations, they were taken into the President's service as a ceremonial guard. Having them around would surely add at least some sense of legitimacy."
 jom_expedition.104.a: "New masters, same old loyalties."
 
 jom_expedition.105.t: "Revenge of the Varangians"
 jom_expedition.105.desc: "The Miklagard the Vikings saw was nigh-unrecognizable to the city they had heard about in their sagas. There was no denying it in their eyes - the imperial capital had fallen, and it was their duty to avenge its capture in the one way they understood: pillaging and razing it to the ground in the name of the Basileus. Hagia Sophia, since turned into a mosque as a symbol of the Turkish victory, looked like the ideal first target. Pushing past the crowds and slaying any guards who dared to stand in their way, they entered the historic building, marveling at its splendor. Over the next few hours, they hauled any valuables that were small enough to carry back onto their longships. On the age-old walls, they carved out runes bearing threatening messages to the 'Turkic Sultan,' but mostly personal notes memorializing their presence in the raid. Returning to the boats with all the valuables, the Vikings saw them threatening to sink from the sheer weight of their treasure, and thus, they threw the excess into the bay's depths. In the end, they were forced to admit defeat. They had only managed to pillage 0.0001% of the city. The rest was, unfortunately, still standing."
 jom_expedition.105.a: "Still, the 'Sultan' must quake in fear at their return."
 
 jom_expedition.106.t: "Lebanon" 
 jom_expedition.106.desc: "We are bound for shores of Lebanon. Once a nexus of Phoenecian wealth, then that of Ottoman Empire, it is now a belaguered place rich in history and strife. Their relationship with Israel is bitter and complicated, and they may prove eager traders of whichever Israeli equipment they hold on to. Beirut port on the other hand, is wealthy, weakly secured and ripe for the taking." 
 jom_expedition.106.a: "Let's see what's on the black market menu." 
 jom_expedition.106.b: "Ég ríf helvítis hjartað úr þér!"
 
 jom_expedition.107.t: "Chariot trade"
 jom_expedition.107.desc: "Lebanon wasn't the nexus of global wealth for centuries, but they did have something special to train: An Israeli piece of AFV equipment, a Merkava tank. This chassis had some technologies the Lebanese overlooked: Our engineers insist we could reverse engineer it into AA system, even a component for our own Iron Dome, should we choose to make one."
 jom_expedition.107.a: "The sons of YHWH do make the best chariots still."
 
 jom_expedition.108.t: "Port Assault"
 jom_expedition.108.desc: "This was straightforward. Under the dead of night, our vanguard dispatched the port authorities and no one was prepared for our types of ships to enter. Clearing out token resistance, we heisted any container we could find in the port of Beirut. Remind me to never operate a container crane drunk again. Some skulls were earned when initial security response made it, but by the time anything heavy was in place, we were gone. Now to open the containers and see what's in them..."
 jom_expedition.108.a: "Boxes with loot. Lootboxes. Sorry."
 
 jom_expedition.109.t: "Congo" 
 jom_expedition.109.desc: "The winds change as we approach the equator, reversing their course as we sail past. The water turns brown, colored by the debris emerging from the mighty Congo River Delta. The waterway itself is navigable, up to a point, at least, potentially allowing us to reach Kinshasa and attempt to establish trade relations with one of the world's largest mineral producers. Alternatively, we could stick to the coast and hunt some big game in the equatorial jungles. Ivory and rhino horns are in short supply, making any hunt a lucrative ordeal. It would, however, reduce us to the role of poachers, and even then, tracking these beasts might prove difficult due to their low numbers." 
 jom_expedition.109.a: "Trading with these people could be a gold mine. Literally." 
 jom_expedition.109.b: "Looks like it's Safari time!"
 
 jom_expedition.110.t: "Axe and Machete"
 jom_expedition.110.desc: "In Kinshasa, the Viking crew was treated to a stately visit by the ruling junta. There was a sense of understanding between the warlord caste in charge and the similarly brutish raiders. The meeting, initially held in the Palace du Peuple with a feigned sense of decorum, quickly devolved into something more akin to a feast of two tribal chieftains, exchanging war stories and trying to outdo one another in terms of personally committed atrocities. Striking the eventual deal was trivial, if not accidental. Embracing the Viking leader as his spiritual brother, the Congolese marshall offered him the finest of earth's bounties, for which, in turn, he was promised their appropriate value in gold acquired during previous and future raids. And though no formal treaty had been signed, the verbal agreement was stronger than any empty words on paper. It was only after the hungover Vikings departed back to Jomsborg that they realized they had come into the possession of precious, rare earth minerals - cobalt, diamonds, copper, and perhaps even more crucially for their modernization efforts: coltan, a critical component of capacitors. Somehow, they had just undercut the entire global market."
 jom_expedition.110.a: "Diplomacy always gets easier with a bit of mead."
 
 jom_expedition.111.t: "A Friend in the Jungle"
 jom_expedition.111.desc: "The Viking contingent spent a week fruitlessly searching for any signs of huntable wildlife, and their supplies were beginning to run low. Eventually, one of their scouts found animal tracks, which the crew readily followed. As they continued, they found more tracks and broken branches, all converging on a modestly sized waterhole. To their amazement, a small elephant was sipping from it, unaccompanied. Slowly, axes ready, they approached it from all sides, trying to corner it. When they were roughly 10 meters away, the animal, startled, charged forward, nearly knocking over one of the Vikings before stopping, full of curiosity. As one of the warriors readied himself to attack, he was stopped by the group's goði, who interpreted the animal as a sign from Odin himself. Slowly, he reached out his hand and gently petted the elephant's side, causing the beast to trumpet affectionately. The animal closely followed the crew on their way back to their ships, stepping onto one of the vessels without hesitation. The captain ordered his men to cut down nearby shrubbery and gather fruits for the journey, and soon, the Vikings and their unexpected friend headed back to Jomsborg."
 jom_expedition.111.a: "Trööööt!!!"
 
 jom_expedition.112.t: "Cape Town" 
 jom_expedition.112.desc: "Kaapstad, Cape Town, Kapsztat, is a jewel of South Africa. In here, British and Boer newcomers dwelt and until recently, lorded over the locals in wealth and power. Or should I say, mercilessly colonized them. Perfidious Albion, ever persistent in its colonial legacy, to this day sparks greviances among the Black Africans. We could raid the decadent whites to pay homage to those downtrodden. Or we could come bearing gifts, and receive gifts of precious metals and diamonds in return. They will fetch an amazing price in many places." 
 jom_expedition.112.a: "Shiny diamonds? Where's my purse?" 
 jom_expedition.112.b: "Ég ríf helvítis hjartað úr þér!"
 
 jom_expedition.113.t: "Cape Town trade"
 jom_expedition.113.desc: "We're carrying gems and diamonds in bulk. Whites and black alike had grand demand for our loot and money: And paid well in rough shinies! We cut and polish the preciousness on our way home, knowing we will swim in capital once we make it home!"
 jom_expedition.113.a: "Rumors of Poland's destitution are greatly exaggerated"
 
 jom_expedition.114.t: "Cape Town raid"
 jom_expedition.114.desc: "The Boers made for fierce opponents, a perfect test for our raiding warriors. We had to hurry to enlist whichever native Black african was there to help. With this we put fear in the hearts of evil colonists, even as their armed forces were quick to react. After our just and sacred slaughter, we had no choice but to give ground and leave, lest they be the ones to drink from our skulls. Nonetheless, the exercise in anti-colonialism made for a great reminder of our solidarity with those who aren't white. Making them, as any good socialist knows, downtrodden."
 jom_expedition.114.a: "Marx and Harald!"
 
 jom_expedition.115.t: "Somalia" 
 jom_expedition.115.desc: "It is strange to call Somalia a failed state, when its people are content to substitute on oases and literal piracy investments: Donate an RPG, get share of loot. This pirate stock exchange, however, places them as our direct competitors, and perfect rivals to hone our skills on. Or we can sell them just about anything, in exchange for rust and scarp from their many wrecks." 
 jom_expedition.115.a: "One Somalian's scrap is another viking's treasure!" 
 jom_expedition.115.b: "Ég ríf helvítis hjartað úr þér!"
 
 jom_expedition.116.t: "Somali Scrap"
 jom_expedition.116.desc: "Turns out when you walk softly and carry a big axe, the Somali think twice before they attack. We used their hesitation to offer barter, and soon their 'pirate' expedition came loaded with our goods and an incentive to extract scrap for us. After making an example of one or two parties who sought to rip us off, we've made sufficeint impression to have a persisting trade route."
 jom_expedition.116.a: "One rusty hull at a time, we build the better tomorrow."
 
 jom_expedition.117.t: "Clash of Pirates"
 jom_expedition.117.desc: "It wasn't hard to provoke a response by violating their seas and stealing their guns here and there. The reprisal on high seas was comparable to our force: Jury-rigged trawlers and boats, even a converted yacht. They were fast and toothless at range, but their improvised weapons were deadly whenever they got close. We carried the day because range wins over firepower at high seas, and we were able to devise upgrades for our naval guns accordingly."
 jom_expedition.117.a: "Var hann inn bezti ok frómasti allra!"
 
 jom_expedition.118.t: "Mecca" 
 jom_expedition.118.desc: "This is the most sacred site of Islam, the birthplace of the Prophet Muhammad himself. The city is off-limits to non-Muslims, but if we want to trade, we can always divert for nearby Medina. It stands to reason to trade here: Saudis are always ready to offload as much oil as we can carry, which we will need in the wars to come. Or, we do something beautiful. You see, the Kaaba stone is pretty beautiful. It'd be a shame if someone... stole it. Leave the logistics to our brave Vikings. If we want to tell the world we can do anything, we should break into Mecca and steal the Islam's holiest rock. Tychów would be a perfect place for it." 
 jom_expedition.118.a: "Let's get that oil." 
 jom_expedition.118.b: "Ég ríf helvítis hjartað úr þér! Get me that rock!"
 
 jom_expedition.119.t: "Medina oil"
 jom_expedition.119.desc: "Invariably, inordinately, when it comes to business, money talks and religion takes the bus to nearby Mecca. We struck oil with the Saudi deals: We didn't even need to load up drakkars, they will instead handle the transport with their own oilers. We'll need our own state oil business to refine all this oil, but rest assured, this has put us leagues ahead of our foes."
 jom_expedition.119.a: "Black gold is ours!"
 
 jom_expedition.120.t: "Mecca's Kaaba"
 jom_expedition.120.desc: "No one expected such audacity from a bunch of LARPers like us. We descend as lightning, sending women and children reeling and running. The men and the police invariably stand and fight, but invariably fail to even delay us. Our helicotpers converge on the rock, our warriors binding it. And it's done. It rises... and rises... and rises... we make it out just in time. It seems they don't engage our helicopters, fearing the rock be damaged in the fall if they're felled. Behind us, crushed enemies, driven before us, in pursuit. Lamentations of their women. We won't hear the end of it. There will be fatwas all over. A jihad or two. Ummah will converge upon us and give us hell. But we've done it. Tychów is the new holy site of Islam."
 jom_expedition.120.a: "It was the best and the worst 'what have we done' moment of our lives."
 
 jom_expedition.121.t: "Dubai" 
 jom_expedition.121.desc: "Like Rome before it, Dubai is an opulent, decadent place, built on back on wage-slaves and spoils. for Rome, it was spoils of war, for Dubai, these are spoils of the earth. Now it is a testament of how filled with pride our the rulers of Islamic world, nevermind the Muslim values. New and old money alike flocks there for networking and tax haven purposes, and the fate of those who aren't filthy rich, whether Instagram model or a laborer, is worse than death. We have a pretty good idea how to sack the whole place for one-time oil gain, untold riches and to free the wage-slaves. Or we could just chill and have a party there. For some reason." 
 jom_expedition.121.a: "Let's show our civilized side" 
 jom_expedition.121.b: "Ég ríf helvítis hjartað úr þér!"
 
 jom_expedition.122.t: "Dubai Networking"
 jom_expedition.122.desc: "We had fun, we suppose. We've met some important people, but most of them just thought themselves important. Alas, most of them didn't think us serious enough to trade with properly, but we did got invited to a few parties with noveau riche tech bros. We had to leave as soon as they brought in the strippers, however, as they all seemed coerced and a few didn't seem of legal age. We move on somber and confused, the riches and slaves of Dubai waving us farewell. Any proper viking will spit on our conduct there."
 jom_expedition.122.a: "Maybe if we introduced a new crypto, they'd take us seriously. NjörðrCoin?"
 
 jom_expedition.123.t: "The Scourging of Dubai"
 jom_expedition.123.desc: "Crush our enemies. See them driven before us. Hear the relieved sighs of their whores! We came as sandstorm and behind us, wealth was plundered and fires were lit. Oh the terror of the high and mighty and rejoicing of the underworld's slaves! Every luxury store looted. By the Gods old AND new, we have never seen and taken as much! Captures of rich and mighty men and women, begging to be ransomed for cash, or better yet, crude oil contracts! Pradas and Svarowskis galore. Half the muscle cars aflame, the other half, in our hands! Every precious metal and piece of worth pillaged. By the time UAE organized a response, an ACTUAL sandstorm blocked the way, and our ships were enough to ward off the coast guard. We were forced to delay our expeditions for sole purpose of wrapping up the rapine pillage, and of course evacuating the survivors among the downtrodden lower classes. With our sacking, untold wealth was seized. Sagas will be sung about this worldwide, with the masses and like-minded regimes rejoicing. Eventually, sandstorm lifted and the UAE forces moved in, with us long gone. One police officer's corpse greeted them, with a speaker in his mouth repeating on loop:"
 jom_expedition.123.a: "Gentlemen, welcome to Dubai."
 
 jom_expedition.124.t: "India" 
 jom_expedition.124.desc: "The Indo in Indo-European language group indicates this here subcontinent. Some of the eldest civilizations existing, backed by millenia of unbroken pagan traditions. The way most of the world was conquered by Christendom, and even China 'falling' to Marxism, (which some of our braver critics dare call Christendom's legacy), the survivability of original Indian pantheon only makes it more impressive. We can obtain artifacts from millenia ago in a raid against it, powered by ancestral worship. Or we come as traders: The nation is in the middle of a technological ascandance, boasting a long-standing tradition of both innovation and... digital guile, let's just say." 
 jom_expedition.124.a: "Let's join in the tech transformation" 
 jom_expedition.124.b: "Ég ríf helvítis hjartað úr þér!"
 
 jom_expedition.125.t: "India Trade"
 jom_expedition.125.desc: "The hoi polloi of India, teeming like ants, fetched a fine price for our goods, and the best and brightest of that nation, likewise teeming in our comparison, all but showered us in hardware and software alike. We bring home digital support from companies at a scale unimaginable in Poland, as well as contracts with several 'social engineering' outfits, each with years of experience working for Navalny, Le Pen, Trump and others. Their main duty will be training our own digital information warfare brigades."
 jom_expedition.125.a: "Welcome to Jomsborg tech support, how can I help you?"
 
 jom_expedition.126.t: "India Fiasco"
 jom_expedition.126.desc: "India is protected by powerful gods indeed! Such was our humiliation that perhaps even the Crucified Jew went in on our karmic beatdown! Our ships went off-course before we even landed. We ended up at an uninhabited island... or so it seemed. As soon as we touched down we got showered by javelins and other things, consistent with customs of Sentinel Island natives. Try doing opposed landing when off the course yourself, see what happens. As soon as we were at high seas, we saw two rockets glaring up in the sky, slamming down and splitting two of our drakkars in two. On the horizon, our helmsman made out two Kora class missile corvettes. We had no choice but to communicate surrender. They refused to even capture us: They just let us leave with whoever and whatever we could fish out."
 jom_expedition.126.a: "Karma's a bitch"
 
