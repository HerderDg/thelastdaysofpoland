 jom_expedition.130.desc: "wikingowie? słowianie? pomorzanie? niemcy?" 
 jom_expedition.130.a: "Handelhandelhandel" 
 jom_expedition.130.b: "Ég ríf helvítis hjartað úr þér!"
 
 jom_expedition.131.t: "Handel z Chiny"
 jom_expedition.131.desc: "opis"
 jom_expedition.131.a: "guzik!"
 
 jom_expedition.132.t: "Raid na Chiny"
 jom_expedition.132.desc: "opis"
 jom_expedition.132.a: "guzik!"
 
 jom_expedition.133.t: "Korea" 
 jom_expedition.133.desc: "The Korean peninsula is divided into two realms - an agrarian socialist state and a capitalist puppet. The North Koreans are ready to greet us (or literally anyone willing to take them seriously and ignore their humanitarian record) with open arms, making striking some sort of trade deal a relatively safe possibility. They are, however, a pariah state, and associating with them will not be great for our already terrible reputation. The South, on the other hand, is steeped in decadence. Even a look from afar makes it clear that they possess significantly more wealth and, therefore, potential loot, but we might end up having to forcefully pry it from their hands. Are we really sure that we could take them on?" 
 jom_expedition.133.a: "We need partners. Let's see what the North has to offer." 
 jom_expedition.133.b: "The South thinks itself untouchable. We'll show them how wrong they are!"
 
 jom_expedition.134.t: "The Deal of the two Pariahs"
 jom_expedition.134.desc: "As they approached the North Korean coast, the Viking longships were intercepted by a fleet of patrol boats, which first escorted them safely to the shore and then upriver to Pyongyang. There, a red carpet had been unfurled for their arrival, as high-ranking party officials came out to officially welcome them in the capital. The audience with the Supreme Leader was similarly pleasant. The crew was treated as official dignitaries of the Jarl, with all the privileges associated with the title. Anything they could ask for was provided for, and soon, after participating in a couple of propaganda events and being paraded around the city as a show of the nation's increasing foreign support, they were presented with a pre-approved, yet very generous trade deal. The Koreans promised to send a portion of their older tractor models for a rather symbolic sum of gold. Of course, the machines are dangerously outdated, and their technical state leaves much to be desired, but at least they have gained a reliable trading partner that needs them as much as they do."
 jom_expedition.134.a: "This really is the best we can do, isn't it?"
 
 jom_expedition.135.t: "Technological Shock"
 jom_expedition.135.desc: "Luckily for the Vikings, the area of the South Korean coast they decided to land in was frequented only by merchant vessels. They safety stepped out onto the land in the middle of a bustling metropolis, massive skyscrapers dwarfing them and their ships. The raiders forced their way into a nearby factory, prying open its warehouses to reveal countless boxes of small electronics - phones, tablets, children's education tools, among other models, the function of which they barely understood. Having triggered an alarm and knowing it was only a matter of time before the country's military descended upon them, they loaded the devices onto their boats and promptly sailed away into open waters. The raiders' goði, Eirikr, attempted to turn on one of the electronics to ascertain its purpose, only to be met with a loud, continuously repeating melody that followed the Vikings for a few nautical miles of their journey until one of the Berserkers, enraged at the constant grating noise, threw the device and several others overboard."
 jom_expedition.135.a: "Can you blame him? Imagine that same sound for the rest of the journey."
 
 jom_expedition.136.t: "One Piece" 
 jom_expedition.136.desc: "Japan is a chain of mountainous islands clinging to the edge of the world, ruled by an emperor and a warrior elite obsessed with honor, hierarchy, and control. Isolation has shaped them into a disciplined but insular society, deeply suspicious of outsiders and fiercely protective of their sovereignty. They will not greet us with open arms, and any attempt at peaceful contact will require careful ceremony, gifts, and a willingness to play by their rules rather than our own. That said, the islands are far from poor. Japanese ports handle vast amounts of trade, their cities are densely packed with artisans, merchants, and stockpiled wealth, and their countryside is organized with ruthless efficiency. The potential rewards are considerable, but so are the risks. Their warriors are well-trained, their defenses layered, and their resolve legendary. If diplomacy fails, any wealth we seek may have to be taken by force. Are we truly prepared to test ourselves against a realm that has spent centuries perfecting the art of war?" 
 jom_expedition.136.a: "Give them those fancy cere- wait, isn't that Gundam?" 
 jom_expedition.136.b: "Ég ríf helvítis hjartað úr þér!"
 
 jom_expedition.137.t: "Neon Genesis Vikingelion"
 jom_expedition.137.desc: "The arrival of the Viking expedition at the Japanese harbor quickly escalated into an incident of considerable confusion. Upon disembarking, the raiders encountered a colossal white machine of unknown design, angular, heavily armored, and towering over the pier like a constructed idol of war. Its scale and purpose were immediately apparent, even if its nature was not. Japanese officials present at the site reacted with visible alarm. The Vikings, soaked from their voyage and visibly armed, stood in stark contrast to the orderly port facilities and the carefully maintained machine behind them. Attempts at communication broke down almost immediately. Some officials attempted formal gestures, others issued urgent warnings, while several appeared momentarily paralyzed by the situation. Ignoring instructions and alarms, the Viking force advanced toward the machine. Emergency sirens activated across the harbor as soldiers rushed to contain the breach. Shouts echoed between warehouses, and frantic radio traffic filled the air. One of the raiders conducted a direct inspection, striking the machine armored foot and openly assessing its potential usefulness beyond Japan shores. Before the situation could devolve further, the Vikings made their intentions clear. Rather than attempting to seize the machine by force, they presented an offer of substantial loot and material compensation in exchange for ownership of the war machine, abruptly transforming a looming security crisis into an unexpected and highly irregular negotiation."
 jom_expedition.137.a: "Get in the fucking robot, Szymon"
 
 jom_expedition.138.t: "Vikings Bizzare Adventure"
 jom_expedition.138.desc: "The raid on Tokyo commenced with a level of confidence that quickly proved excessive. Viking longships advanced deep into the harbor as the raiding force pushed toward the center of the city, presumably seeking the greatest treasures at the seat of imperial power. The streets were vast, orderly, and unlike anything the raiders had encountered before, lined with towering structures of steel, glass, and illuminated symbols of unknown significance. The advance toward the Imperial Palace was halted almost immediately. Multiple layers of security, rapidly mobilizing defenders, and the sheer scale of the urban landscape slowed progress to a crawl. Distances that appeared manageable on maps proved substantial in practice, and heavily guarded approaches prevented further penetration. Faced with these limitations, the Vikings withdrew from the city center. The operation was not without reward: along the retreat route, crates of digital artifacts were seized from studios, warehouses, and broadcast facilities. These collections of synthetic performers, locally known as vocaloids, were transported aboard the longships as the primary spoils of the operation. Though the Imperial Palace remained untouched, the Vikings departed satisfied. They left Tokyo battered but standing, carrying with them a bewildering new kind of treasure that none of them fully understood, but all agreed was valuable simply because Japan clearly cared about it."
 jom_expedition.138.a: "I really wanted the turquoise one"
 
 jom_expedition.139.t: "Indonesia" 
 jom_expedition.139.desc: "The Republics of Indonesia and Philippines are a small chinese colonial islands making shitty shoes for the world. Or, they are made up of tens oh thousands of islands, hundreds of cultures and languages. Depends who you ask. Nonetheless, for worthy raiding targets, only Singapore shines bright enough, a small city-state with more money to it than anyone would stay sane with. Filipinos and Indonesians on the other hand will eagerly sell us aforementioned shoes and rubber. " 
 jom_expedition.139.a: "We need the rubber more than we need Singapore." 
 jom_expedition.139.b: "Ég ríf helvítis hjartað úr þér!"
 
 jom_expedition.140.t: "The Miklagard of the East"
 jom_expedition.140.desc: "Singapore is a financial node of the East, a mighty city-state matched only by Japan, Korea and China in opulence. It stands to reason to raid its treasury and banks, making it out of the area with precious metals galore. The police, used to carefully engineered docile society of Asian cultures, were not ready for true sons of the North raiding bank after bank in force. We made it out with enough precious metals to have our own new treasury reserve, if we should desire one."
 jom_expedition.140.a: "Odin's eye is not the only thing that glows, the Singaporean gold does too!"
  
jom_expedition.141.t: "Wonders of Indonesia"
jom_expedition.141.desc: "It appears the Indonesian peoples really are determined to larp as lower class Slavs. But so what? The shoes are surprisingly sturdy and we bought them for pittance. More importantly, the rubber obtained would last us forever. Filipinos were just as hospitable, at least for those who could endure them reenacting Passion of Christ. Still, they weren't wealthy enough to raid."
jom_expedition.141.a: "And their food made ours look like onion and beet slop!"
 
jom_expedition.142.t: "'Straya"  
jom_expedition.142.desc: "Remember Ziemkiewicz's Brotherhood of Coal? Someone should exile the lot of them to Australia. They'll get to play in entire mountains of decent open-pit coal instead of drilling our fine nation for coals that would take a dwarf fortress to mine economically. We could strike deals for cheap fossil fuels, as perhaps Odin's beard or necessity has clouded our environmental instinct. Or we can raid this place for... uuuh, world's worst cut narcotics, perhaps?" 
jom_expedition.142.a: "Perhaps Ziemkiewicz has a point about coal when it's so cheap and plentiful." 
jom_expedition.142.b: "Ég ríf helvítis hjartað úr þér!"
 
jom_expedition.143.t: "Australian coal"
jom_expedition.143.desc: "The initial prices were decent, but there was still a matter of distance and some environmental provisions that we had to hire local law firms to deal with. Nonetheless, the shipping commences and we have our line for cheap fossil fuels. We can now rest assured that our own coal-powered ships won't need to pay premium for fuel."
jom_expedition.143.a: "Huzzah!"
 
jom_expedition.144.t: "Second Emu War"
jom_expedition.144.desc: "As we attempted a raid of a city called Perth, we determined we'd be best off making unopposed landing in outback nearby. Problem is, we were met with a migrating throng of emus. We naturally opened fire, but they just kept going back, skirmishing and wearing down our axemen and gunners. Soon enough, kangoroos showed up, concluding we disrupted their breeding grounds: even our finest berserkers were no match for their kicks. The Emus diverted our fire while the kangoroos flanked us as though they were a cohesive army. But the worst part was when a local, some pot bellied junkie who looked like he had eighty teeth, stole our berserker powders, a few axes of ours, an armor and a gun too. He ran away before we could oppose him competently, knocking few of us out and yelling something about being 'the man who grabs the sun riding to Valhalla'. Our kind of guy. I think. We don't spray our teeth with chrome."
jom_expedition.144.a: "Still, learning wildlife migration patterns and behavior can be useful back in Poland when wild hogs become a problem."
 
