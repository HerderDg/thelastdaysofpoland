CONTEXT_JOM: "§H============================================================\nWhat is this faction?\n============================================================§!\n\nPeople's Northern Army as it would be translated is a band of Polish exiles camping on Bornholm island under Danish jurisdiction. They are led by Adrian Zandberg, who was...mentally altered during his jail time in the occupied Eurokommissariats. Now he goes under the name of Halfdan Sandbjerg and commutes with Norse gods. Rest of the followers are...not really buying this situation and for the most time they're role-playing, but there are more and more of people that take this viking thing seriously. Exiles are mostly composed of the followers of the left-wing movements from Pre-Fall Poland such as Together Party and New Left. Their goal? Go back to Poland. But as what? That remains to be seen...\n\n§H============================================================\nWhy are they here?\n============================================================§!\n\nIn lore, there is a precise explanation. They're refugees. They escaped Eurokommissariats, and some of them actually not only left the occupied territory, but had to escape special internment prisons. Denmark was the first stop on the Baltic Sea, and they just stayed there in the special camp for refugees that they started to call 'Folkvangr'.\n\nAs for the place where they land...Jomsborg is a name of modern Polish city of Wolin, which is presumed to be a place of the semi-legendary viking city of Jomsborg. On the island there is a annual festival of Slavs and Vikings and the whole place is embracing this identity. And it's also backed up by excavations and discoveries by archelogists that found out many burial sites. There's also a supposed theory that king Harald Bluetooth died here, but so far it hasn't been confirmed fully by the scientists.\n\n§H============================================================\nWho are the characters?\n============================================================§!\n\nHalfdan Sandbjerg is a norse rendition of a name of Together Party's co-leader, Adrian Zandberg. And it so happens that he actually has some relations with Denmark, as Adrian Zandberg was born in Aalborg, and the memes often portray him as \"Mighty Dane\". Mostly because he probably has blood of Jötunn giants in his veins. That's why he's so big. But overall, he was one of the major politicians in the Polish political landscape. He doesnt' compromise when it comest to his believs and that shows even when he thinks he's a viking. But the madness is of course only a poetic license.\n\nMagdalena Biejat is a left-wing politician, in real life she is actually a former member of Together Party as she left it and joined another left-wing party - New Left, and even tried to run in presidential elections, but without any success. She is a strong proponent of having an agency, and she left Zandberg and the rest because she felt that because they refused to join the coalition, they won't be able to pursue their goals, even if the means would be very minimal. In game, she never left Together Party but still has some issues with how things are going internally.\n\nMarcelina Zawisza is a loyal and long-time member of the Together Party. She was there since the beginning and she's standing firmly and proudly behind Zandberg's agenda. Rest of the cabinet are also Together Party members.\n\n§H============================================================\nWhat is this faction inspired by?\n============================================================§!\n\nMain concept is of course Adrian Zandberg and his past, mostly the fact that he was born in Denmark and he's heavily memed as a viking. Just to be clear - he's not one. He lived in Denmark for several years but he doesn't really have any meaningful connections with this country. But it's a good aura to have.\n\nExpanding on the foundation of Zandberg's socialist personality we have various references to anything related to Norse in the culture. Most of it is of course mythology and the real sagas. But then we used a lot of references to games, movies and music that are exploring Norse themes, such as God of War (newer ones), Vikings (obviously), Wardruna and Heilung (great folk music) and much much more.\n\nSane path and the socialist part of the mixed path is exploring most of the Together Party's political program. I know, it looks bland in comparison with Ragnarok and Valkyries and other mythical things, but well...it may just be slightly better for the society. Just a thought.\n\n§H============================================================\nMiscellaneous lore details\n============================================================§!\n\nAll of the national spirits descriptions are passages from the Poetic Edda.\n\nThere is a theory that the first Polish state was founded by the Norsemen and Mieszko I was in fact Dago, a viking that came to Polish lands with his company and settled here. It's doubted by many scientists, but nonetheless - it's a theory.\n\nExpedition mechanics may contain some unexpected outcomes. And i don't mean the UN coming down on you to beat you up. We digged too deep in our autistic conciousness and found Loch Ness monsters or hidden Nazi bases. Don't even try to ask because we don't know.\n"

CONTEXT_DGR: "§H============================================================\nWhat is this faction?\n============================================================§!\n\nThis faction represents various flavors of the Dąbrowa Górnicza city.\n\nNational Bolshevik path is a homebrew scenario combining the nationalist and communist history of this city, it also is related to developer's fictional scenario from his never released story about the dangers of having too much power.\n\nCommunist path is based on the fact that the Communist Party of Poland had their headquarters for many years in Dąbrowa Górnicza while Krzysztof Szwej was a leader.\n\n§H============================================================\nWhy are they here?\n============================================================§!\n\nCommunist Party of Poland had headquarters in Dąbrowa Górnicza for a long time. Additionally, this region was developed heavily during the communist times leaving the everlasting socialist imprint on the society. Thanks to that, the overall region is called \"Red Basin\".\n\n§H============================================================\nWho are the characters?\n============================================================§!\n\nWe start the game with Marcin Bazylak who is a real president of Dąbrowa Górnicza during the times of the mod. He was appointed a successor to Zbigniew Podraza, and since they have roots in the same leftist party - it was not really that hard for him to secure the presidency.\n\nKrzysztof Szwej is almost a legend. No one really knows much about him, who he is, where he comes from and what he does, except one thing - those who know the name, they know that he was a leader of the Communist Party of Poland for a long time in the 21st century.\n\nAleksander Bargieła is a fictional character. He's an aggressive nationalist and an opportunist. But don't worry - it's not a self-insert, or childish fantasy. He's not really a good person.\n\nDamian Krępa - more known as Bas Tajpan was a singer and songwriter, performing music that straddles reggae, hip-hop, and raggamuffin. He also put some accents or slavic identity and local pride in his songs, and in the local elections in 2023, he even started in the elections on the side of the ruling leftist party, but he did not succeed. He passed tragically away in 2025 after battling cancer.\n\n§H============================================================\nWhat is this faction inspired by?\n============================================================§!\n\nInspirations are various. Communists are straightforward - it was a CPP Headquarters and a LOT of post-soviet monuments were here. Before WW2, Dąbrowa Górnicza also hosted a lot of the country's national socialist movement and there was a large nationalist presence in this city, which led to the fusion that resulted in National Bolshevism path.\n\nSlavic rastafari path is inspired solely by Bas Tajpan's artistic achievements as a reggae singer, which is kinda...unique.\n\n§H============================================================\nMiscellaneous lore details\n============================================================§!\n\nDistrict Wars is heavily fantasized war of certain districts, but there are some real animosies between some of them. For example, there were some groups from Strzemieszyce that wanted to separate from the city. But mostly, by them - I mean the underworld, society of streets - not normal citizens.\n\nPharaohs from the District Wars are based on the fact that there is an actual desert in this city! Well, I mean...Błędów is in the city, but Błędów desert is mostly...outside it. Also, they made polish movie Pharaoh right there. And...Afrika Korps trained there...\n\nKatowice Steelworks is the biggest facility of this kind in the whole country. And as we already know with the names - it can be tricky. Katowice is quite far from here, but this didn't stop the officials from naming it like that.\n\nBroadway and Manhattan are real life names of some of the Gołonóg districts. For a long time they were just unofficial names, but after so many years it just stayed that way and the officials even named the bus stops like that.\n\nDąbrowa Górnicza is a city with many different landscapes. You can find dense urban centres, low dense urban centres, industrial centres, countryside, fields, forests, plains, lakes, rivers, hills and even a desert. With an area of the largest city in the voivodeship, you can really find everything here.\n\nSławków in real-life is a separate city, but for the sake of lore, it was incorporated into Dąbrowa Górnicza. It's not that big of a stretch because for some time it really was a part of Dąbrowa Górnicza, but they didn't like it there so much they decided to separate and join the administration of Będzin county that is on the opposite side of Dąbrowa Górnicza making them an administrational exclave.\n\nSimilar to Warsaw, there is an actual Palace of Culture also in Dąbrowa Górnicza. Only it's smaller...there were some plans to make it bigger but I guess the grounds around the city that used to be one giant coal mine is not that stable after all?\n\nAll of the focus descriptions are written from the perspective of Aleksander Bargieła, which is purposefuly biased.\n"

CONTEXT_CAL: "§H============================================================\nWhat is this faction?\n============================================================§!\n\nCalisia is a state that tries to restore the glory and power of Roman Empire by all means necessary. It might look like a LARP, but in time it gets really serious. It comes with every up and down of a real historical Rome down to factional infighting, praetorian coups, unruly Senate and barbarian invasions. It's a fast history lesson bottled up in a Polish warlord state.\n\n§H============================================================\nWhy are they here?\n============================================================§!\n\nCity of Kalisz is presumed to have long history, but some of the people claim that its roots come from ancient city of Calisia which is present on the Ptolemy's map somewhere in this region. Also, there were many found artifacts from the Roman times. As far as the claims for the Roman Empire goes, this one is clearly not too strong, but this doesn't stop the city from embracing this acclaimed history. Many of the street or building names are references to the ancient history and the city is proud of this.\n\n§H============================================================\nWho are the characters?\n============================================================§!\n\nRyszard Kalisz is a lawyer and left-wing politician that for many years was a part of Polish parliament. Though his prime time is long gone, he still is active in the political life. He's here just solely because of his name. Which coincidentally is the same as Polish name for this city. His only connection to Roman Empire is his knowledge of the law, and perhaps he was few times on a vacations in Italy. But, he was always a jovial man and despite his appearances - a womanizer. It's not so hard to imagine him as a hedonistic Emperor.\n\nRest of the characters are real politicians from the region and some of them are scholars that specialize in the ancient or medieval history\n\nReal president of the city of Kalisz is actually Krystian Kinastowski who plays a role of Praefectus of the Praetorian Guard here\n\nMarcus Vinicius is a character from the Polish movie Quo Vadis about the burning of the Rome by Nero, played by Paweł Deląg. And he just looks too nice to pass on this opportunity to have him as a character\n\nMarcin Najman, who becomes an Emperor in one of the endings really did pose as an \"Emperor\" in one of his stunts to promote his fighting galas. Also, he liked to comment current political affairs dressed as beforementioned \"Emperor\"\n\n§H============================================================\nWhat is this faction inspired by?\n============================================================§!\n\nRome. A lot of Rome\n\nAlso, the fact that there is Calisia on the Ptolemy's map\n\nAnd maybe a bit of Ceasar's Legion from the Fallout. But it was not really decisive one.\n\n§H============================================================\nMiscellaneous lore details\n============================================================§!\n\nThere are lot of references to movie Asterix and Obelix: Mission Cleopatra. We do love that movie here in Poland.\n\nThis faction was created solely for the purpose of writing as many events about Ryszard Kalisz going to Żabka shop (Ranula in latin) as possible. I mean, not entirely - but it became a running joke during the development\n"

CONTEXT_ATM: "§H============================================================\nWhat is this faction?\n============================================================§!\n\nAtomic Crusade is a fictional faction that began as a mistification, as a threat carefully created by Brotherhood's propaganda departement and books of Elder Ziemkiewicz. But after a while this threat turned out to have a serious amount of pull towards its ideology and Jakub Wiech had no other option than to flow with it. It's an environmental crusade against coal and emissions, and moreover - it's a pro-nuclear faction that will not stop until Poland will achieve nuclear power status.\n\n§H============================================================\nWhy are they here?\n============================================================§!\n\nWhere is the more perfect place for atomic afficionados than Bałuty Exclusion Zone? Additionally, it's a perfect spot to begin their environmental crusade against Brotherhood of Coal who has in their black pawns whole of the voivodeship.\n\n§H============================================================\nWho are the characters?\n============================================================§!\n\nJakub Wiech is one of the more known Polish journalists and renewable energy experts that is set upon the impossible task of convincing Polish population that renewable energy is not a devil in disguise and nuclear power is safe and needed for our country to prosper. Not everyone looks at him with admiration though.\n\n§H============================================================\nWhat is this faction inspired by?\n============================================================§!\n\nAtomic Crusade is strongly following the Fallout theme, we do have a slight Children of Atom vibe here, but we tried to fit in every other nuclear trope we could find such as for example Stalker or Metro franchises\n\nIn the ongoing political dispute, Jakub Wiech is a stron opponent of German climatic policies, especially their Energiewende program and shutting down their nuclear power plants, which gave birth to in-game lore of going against German state in the end game\n\n§H============================================================\nMiscellaneous lore details\n============================================================§!\n\nNuclear Power Plant Construction Focus Tree is inspired by various propositions for the real Polish state to build their first nuclear power plant. Some were discarded, some were considered. We tried to focus on the most interesting ones.\n\nAcquisition of uranium deposits in-game is far-fetched when it comes to Polish actual deposits, most of them are considered not viable for extraction or would result in massive landscape changes in settled areas. But it's just a game and it was a massive pain to calculate amounts from each deposits so the numbers would somewhat check out.\n\nJakub Wiech is one of the few real people that know about our mod and he was very supportive and happy about it. We can't complement him enough so again - we send our best regards to him.\n\nFirst focus tree was created in a fucking dream of one of the developers.\n"

CONTEXT_BBW: "§H============================================================\nWhat is this faction?\n============================================================§!\n\nBrotherhood of Coal is a fictional faction dedicated to one single goal: to make Poland burn coal, and burn it hard\n\nThey are organized in quasi military order form with slight traces of a liberal approach to economy (at the start)\n\nThey oppose any form of ecologism and anything to do with renewable energy sources\n\n§H============================================================\nWhy are they here?\n============================================================§!\n\nBełchatów Mine is one of the largest lignite coal mines in Europe, and it's so vast it's visible from space.\n\nBełchatów Power Plant which is located next to mine is Poland's biggest power plant produces about 20% to 30% of Polish total energy production\n\nBrotherhood of Coal has regional chapters in Lublin region and Upper Silesia but its headquarters are located in Bełchatów due to central position\n\n§H============================================================\nWho are the characters?\n============================================================§!\n\nCharacters from this faction are mostly polish right-wing leaning journalists and media personalities that have openly taken their pro-coal stance in the ongoing political disputes\n\nRoksana Węgiel is one of the most succesfull young Polish popstars, and it's here only due to the fact that her surname in Polish means literally \"Coal\".\nSo we thought it would be funny if she was one of the characters that want to reform this state.\n\n§H============================================================\nWhat is this faction inspired by?\n============================================================§!\n\nThis faction is an obvious caricature of Brotherhood of Steel from the Fallout series, imprinted into the Polish state, which historically relied heavily on the coal\n\nIt takes inspiration from contemporary conflict in Polish politics regarding energetic transformation and shutting down our carbon imprint, in which characters from this faction are heavily invested in\n\n§H============================================================\nMiscellaneous lore details\n============================================================§!\n\nInside lore indicates three factions that formed the Brotherhood of Coal before start of the game; Republic of Bełchatów, Miners from the Bełchatów Mine and military personnel from the Łask Air Base\n\nBrotherhood of Coal provides the whole Dialogue Zone with electricity and coal supplies. They don't really want to, but for now it's pragmatic to participate in this alliance\n\nThere are rumors of some hidden cults worshipping coal and furnaces, but these are just rumors, right?\n\nSmog doesn't exists. And even if it does - it's good for you. It's a sign of progress after all. But be aware of some side effects\n\nSmog bricks are real though. There was some Chinese guy that used a vacuum cleaner to clean the air in one of China's cities and from the waste he made a brick. It was so beautifully Brotherhoody that we had to use it.\n"