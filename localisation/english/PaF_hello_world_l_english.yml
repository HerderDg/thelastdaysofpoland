 ## PATHS ##
PATHS_CAL: "§RWARNING - SPOILERS AHEAD!!!§!\n\n============================================================\n§p1. Populares:§!\n\nTo get the §pPopulares Ending§!, you must succeed at maintaining their dominance over the Senate, while keeping the other §0parties§! loyal to the throne. The §pPopulares§! must pave the way to detente during times of crisis.\n\nYou need to pass the §pPopulares§! version of the law in the focus §YLex Barbarorum§!.\n\n§12. Optimates:§!\n\nTo get the §1Optimates Ending§!, you must succeed at maintaining their dominance over the Senate, while keeping the other §0parties§! loyal. The §1Optimates§! must stand their ground, especially during times of crisis. \n\nYou need to pass the §1Optimates§! version of the law in the focus §YLex Barbarorum§!.\n\n§03. Praetorian Plot:§!\n\nFor the §0Praetorian Plot§! to fire, the §0Praetorian Guard§! must at some point become disloyal to the §YEmperor§! (below 30 loyalty). The plot will fire during a time of Crisis, during the §pPopulares§! path, when their gerrymandering in the Senate becomes apparent. After the plan is formed, §0Praetorian§! gravitas needs to be kept above that of the §YEmperor's§! in order to prevent it from being found out.\n\nTheir path allows them to secure power all for themselves, or follow in the steps of Cincinnatus, relinquishing power back in the hands of the Senate, with a good dose of oversight.\n\n§03a. Praetorian Empire:§!\n\nSuccesfully complete §0Praetorian Plot§!. After that, §1Optimates§! will also have to be taken care of by starting the focus §YDiscordia§!\n\n§03b. Restoring the Res Publica:§!\n\nSuccesfully complete §0Praetorian Plot§!. After that, reconcile with §1Optimates§! by starting the focus §YConcordia§!\n\n§g4. Triumvirate:§!\n\nThe Triumvirate ending requires you to also make the §0Praetorians§! disloyal at some point during the game, however this time in the §1Optimates§! path. If the §0Praetorians§! are ever made disloyal to the §YEmperor§! and their gravitas higher than the §1Optimates'§! when the §1Optimates§! move to secure their rule over Calisia during Crisis, the §YEmperor§! will meet a mysterious death.\n\n§R5. Fall of Calisia:§!\n\nThe Eternal City must fall into the hands of §RGermans§!, so a new §RBarbarian§! ruler can take the reins of his Kingdom.\n\nYou either lose Calisia and get 60% war capitulation, or get 90% while still holding it during the Barbarian Crisis.\n"
PATHS_BBW: "§RWARNING - SPOILERS AHEAD!!!§!\n\n§g============================================================\n1. Rafał Ziemkiewicz - Hardline Brotherhood:\n============================================================§!\n\nMake sure you pick up most of the hardline options whenever available:\n\n- Go with Warzecha's economical plans in first and fourth trees §g(Remotorisation of Society and Silesian Metropolitan Committee)§!\n\n- Pick Jakub Zgierski as the leader of §gCarbonarii§! in the third tree\n\n- You get additional point if Atomic Crusade rebelled and you've defeated it\n\n- Go with military focuses such as §gHarder is Better, Enlist the Commissars§! and §gWeaponization of Smog§! in the fourth tree\n\n- In the Inner Circle GUI you ascend more hardlined characters such as §gTomasz Rzymkowski, Łukasz Warzecha, Jakub Zgierski and aligned Stanisław Janecki§!\n\n§7============================================================\n2. Roksana Węgiel - Reformed Brotherhood:\n============================================================§!\n\nMake sure you pick up most of the lenient options whenever available:\n\n- Go with Gadomski's economical plans in first and fourth trees §7(Liberalize Arms Production Laws and Gadomski's Budget)§!\n\n- Pick Roksana Węgiel as the leader of §7Carbonarii§! in the third tree\n\n- Go with military focuses such as §7Fast is Good§! and §7Stimulant Activated Carbon§! in the fourth tree\n\n- In the Inner Circle GUI you ascend more reformist characters such as §7Jacek Bartosiak and Piotr Zychowicz, Witold Gadomski, Roksana Węgiel and aligned Stanisław Janecki§!\n\n§H============================================================\n3. Jakub Wiech - Atomic Crusade:\n============================================================§!\n\n- Fail at dealing with §HBlackout§! (delete your power plants and/or demolish all renewable plants available via events).\n\n- Win the §Hcivil war§!\n"
PATHS_ATM: "§RWARNING - SPOILERS AHEAD!!!§!\n\n§H============================================================\n1. Nuclear Ending:\n============================================================§!\n\n- Simply pick the §H...nuclear winter§! focus in the last tree, and win the war.\n\n§7============================================================\n2. Peaceful Ending\n============================================================§!\n\n- Simply pick the §7...and we are ready§! focus in the last tree.\n"
PATHS_DGR: "§RWARNING - SPOILERS AHEAD!!!§!\n\n§N============================================================\n1. National Bolshevism:\n============================================================§!\n\n- Make sure that the §NCongress of Będzin§! fails (you can do it by picking the options only for one faction)\n\n- During the §NDivergences of the Politburo§! balance of power go for the §NPartisans Faction§!.\n\n- During the §NThree Wishes§! crisis started by §NBas Tajpan§!, go for the legalization of marihuana.\n\n§R============================================================\n2. National Communism:\n============================================================§!\n\n- Make sure that the §RCongress of Będzin§! fails (you can do it by picking the options only for one faction). In the future this path will be achievable by also succeeding in the Congress of Będzin, but for now...it's better to fail it.\n\n- During the §RDivergences of the Politburo§! balance of power go for the §RSilesian Faction§!.\n\n- During the §RThree Wishes§! crisis started by §RBas Tajpan§!, go for the legalization of marihuana.\n\n§7============================================================\n3. Slavic Rastafari:\n============================================================§!\n\n- Make sure that the §7Congress of Będzin§! fails (you can do it by picking the options only for one faction).\n\n- During the §7Divergences of the Politburo§! balance of power go for either of factions.\n\n- During the §7Three Wishes§! crisis started by §7Bas Tajpan§!, DON'T go for the legalization of marihuana.\n"
PATHS_JOM: "§RWARNING - SPOILERS AHEAD!!!§!\n\n§s============================================================\n1. Healing - Adrian Zandberg Sane Path :\n============================================================§!\n\n- During the §sTwilight of the Man§! balance of power go for the §sVolition§! three times. Each time you will get a sequence of dreams. There you will need to pick correctly most appropriate options. After three passed dreams on the side of §sVolition§!, Zandberg will be healed and the path will lock in.\n\n§R============================================================\n2. Socialist Viking - Mixed Path:\n============================================================§!\n\n- During the §RTwilight of the Man§! balance of power don't go for the either side three times. Each time you will get a sequence of dreams. There you will need to pick correctly most appropriate options. If you don't pass all dreams on the one side, Zandberg will realize that he's something new and the path will lock in.\n\n§1============================================================\n3. Destiny - Adrian Zandberg Full Norse Path:\n============================================================§!\n\n- During the §1Twilight of the Man§! balance of power go for the §1Destiny§! three times. Each time you will get a sequence of dreams. There you will need to pick correctly most insane options. After three passed dreams on the side of §1Destiny§!, Zandberg will be overtaken by the ghosts of the past, the carnage will follow. and the path will lock in\n"




