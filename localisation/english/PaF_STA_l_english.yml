 STA_mesko_mio: "MESKO"
 STA_mesko_mio_initial_trait: "Rocket Artillery Manufacturer"

 STA_communism: "Communist Agitation"
 STA_communism_desc: "Our deteriorating economic situation has led to the populace becoming disillusioned with the government, causing the poor and downtrodden to gravitate towards the socialist opposition, which gets more and more radicalised by the day, leading to worker strikes and protests that further worsen our already abysmal situation. If we don't deal with this quickly enough, we may soon have a revolt on our hands."
 
 STA_democracy: "Last Stand of Democracy"
 STA_democracy_desc: "Thanks to Materek's efforts, Starachowice Communities are among the last truly democratic countries in the region. The government is widely praised for its protection of personal liberties, while old parties like PiS or New Left remain on the ballot, although they lack the popularity needed to bring about change in the new system."
 
 STA_labor1: "Aching Heart of Labor"
 STA_labor1_desc: "Resource shortages, protests, failing factories-Starachowice's economy explained in just 5 words, and the road to economic recovery seems to get longer and longer thanks to our war with the Prosecutorship and leftist agitation, which only further erodes the people's trust in our government and weakens our already collapsing economy."
 
 ###   National Spirits   ###
 
 
 ###   First Tree   ###
 
 
 ###   Country Events   ###
 
 starachowice.1.t: "Victory over Ziobro!"
 starachowice.1.desc: "After a hard-fought war the Ziobrite forces have accepted our terms of peace! We managed to secure some land under the treaty, and now that our war has finally ended, we can focus on rebuilding our new territories and old ones alike. Let's raise a toast to this significant victory!"
 starachowice.1.a: "Victory at last!"
 
 starachowice.2.t: "Ziobro refuses Surrender!"
 starachowice.2.desc: "Despite our clear advantage, the Ziobrite forces have refused the peace treaty! We will have to fight until they are too weakened to defend their land, and then we will finally claim our well-deserved victory!"
 starachowice.2.a: "Forward soldiers, to Kielce!"
 
 starachowice.3.t: "Sandomierz Negotiates with Ziobro"
 starachowice.3.desc: "Our southern neighbor, Sandomierz, has begun negotiating with the Prosecutorship. While time will tell if their attempt whether their attempt will be successful, it's a good occasion to open negotiations with the Ziobrite forces too."
 starachowice.3.a: "Let us wait and see how Sandomierz fares first."
 
 starachowice.4.t: "Seizing the Borderlands"                          #TODO, I don't know when does it happen
 starachowice.4.desc: "treść o tym jak zajebujemy tereny graniczne"
 starachowice.4.a: "nareszcie"
 
 starachowice.5.t: "Chaos in the Capital!"
 starachowice.5.desc: "The socialist opposition has organised a massive strike in Starachowice! While at the beginning it was non-violent, more radical groups attacked the police, only for the police to retaliate, escalating the situation beyond our control. The only question now is who will win this conflict, will it be the opposition, the government or will the conflict escalate so much that it will cause a civil war?"
 starachowice.5.a: "The government prevails!"
 starachowice.5.b: "The socialists take over the city!"
 starachowice.5.c: "The conflict escalates into a civil war!"

 starachowice.6.t: "End of the Conflict!"
 starachowice.6.desc: "After many months of fighting with the Prosecutorship, we have prevailed! While we can't bring the dead back to life, we can repair the damages and make sure that should such a conflict ever arise again, we will be armed and prepared!"
 starachowice.6.a: "Long live Starachowice!"

 starachowice.8.t: "Pilgrims from Sandomierz Seek Passage"
 starachowice.8.desc: "opis o tym że przychodzą pielgrzymi i chcą iść betonowego tupolewa zobaczyć" # TODO, no idea for it for now
 starachowice.8.a: "tak"
 starachowice.8.b: "nie"
 
 ###   News Events   ###

unification.127.t: "[GetNewspaper]Starachowice Communities unify Holy Cross!"
unification.127.desc: "Against all odds, Starachowice Communities, a small democracy from in the Holy Cross Voivodeship has emerged victorious and reunified the Holy Cross Voivodeship! One of the small states resisting the Prosecutorship, despite being in an abysmal position managed to hold on until the Prosecutorship collapsed, and later, despite opposition from the socialists and a ruined economy, Starachowice managed to come out victorious in the war for the Holy Cross Voivodeship. The leader of the newly created Federation of Central Poland, Marek Materek, has proclaimed that the struggle is not over, and he won't rest until Poland is restored as a democratic republic"
unification.127.a: "Is there still hope for democracy in Poland?"




