l_english:
 
 krakow_cw.1.t: "Choosing a way for Kraków"
 krakow_cw.1.desc: "Our president is a man of many talents. Professor, president, member of the monarchist movement. It makes the question of our future especially interesting. Where should we go?"
 krakow_cw.1.a: "Democracy"
 krakow_cw.1.b: "Scientocracy"
 krakow_cw.1.c: "Monarchy"

 krakow_krul.1.t: "Appointing the Regent"
 krakow_krul.1.desc: "Monarchy is a fickle beast, and finding a perfect candidate is no easy task. While we deliberate, the question of who will lead us remains unanswered. That's why we need a regent, who will act as a temporary ruler until a suitable monarch is found. The Magistrate believes that there is no better alternative than to allow our president to ascend to this honorable position. Because...who else?"
 krakow_krul.1.a: "Another Regent?"

 krakow_krul.2.t: "Regency Council Established"
 krakow_krul.2.desc: "Today, we have established a Regency Council for the Royal City of Kraków. The Sigismund Bell sounded across the whole city like the monarch was already elected, but it's just Majchrowski wanting to ascert his dominance. Nevertheless, now the tedious job of finding a perfect candidate begins. One, who will sit on the Wawel hill and overlook our majestic city. One who will actually know Poland and its inhabitants. One who will be an ideal symbol. But does such candidate even exists?"
 krakow_krul.2.a: "Let's hope this time they will actually do their job."

 krakow_krul.3.t: "Petition from Łowicz"
 krakow_krul.3.desc: "We have received a strongly worded letter \"demanding\" that we immediately give the position of a monarch to Jacek Bartyzel or, even better, to some random Łowiczan that we have never heard about. Why? It gets a little foggy. They talk about 'we wuz capital' and other nonsense. Then, the letter proceeds to describe the entire history of this city and every little village around it, and how significant they were...once. If it weren't written in such a pretentious tone, it would be a pretty nice fiction. At the end of this message, they reinforce their demands with a straight litany of insults that they are a Duchy, they have a unique history, a unique language, a unique culture, and they should be treated with utmost respect."
 krakow_krul.3.a: "What is wrong with people from this town?"

 krakow_krul.4.t: "Letter from Another Regent"
 krakow_krul.4.desc: "Regent of Poland and the Polish Monarchist Movement Leszek the Great Duke WIERZCHOWSKI, Grand Prince of Ukraine-Rus, Prince of the Russian Empire, Emir of the Tatars claims that he is the only one to rightfuly seat on the Wawel throne. Currently residing in Leżajsk, Wierzchowski was indeed for many years one of the leaders of a monarchist movement in Poland, but he does not have the right mind to claim such responsible position. Let him be a king of some village and leave the ruling to serious people."
 krakow_krul.4.a: "It's a rock bottom, right?"

 krakow_krul.5.t: "Usurper from Tykocin"
 krakow_krul.5.desc: "As if the previous attempts weren't enough, now we have a usurper from Tykocin claiming the throne. This is becoming a farce. Marek Świętopełk Świętopełk Zawadzki, ruling from some backwater as Świętopełk I Jagiellon (though he claims he's a descendant of Bolesław I Piast...) send us a letter with his candidature for the throne. Well, this man used to praise that he \"cures\" mental disorders such as depression and schizophrenia, as well as bisexuality, homosexuality and masturbation. Definitely a sane man. Don't even bother with replying."
 krakow_krul.5.a: "God, save our country from such kings..."

 krakow_krul.6.t: "A Pitiful Attempt"
 krakow_krul.6.desc: "Last but not least, where everything seemed to be lost, there arrived Konrad Berkowicz with one of his glorious ideas. According to him, we shouldn't try to find a king but make a new one. New dynasty, new house. And does he know where to find such candidate for this attempt? Of course he knows - it's him. Although this is just another of Berkowicz's idiotic jokes, he might be onto something. Because it will be near impossible to find an alive nobleman who is not a crazy and power-hungry. So, we just might have to start a new dynasty. But of course, not with Berkowicz."
 krakow_krul.6.a: "Get lost, Konrad...we have a better idea."

 krakow_krul.7.t: "Electoral Quagmire"
 krakow_krul.7.desc: "There are no real and serious candidates to consider in this country. And looking for them outside our country would make us lose legitimacy. This is not a time for foreign monarchs, whatever claims for the Polish throne they might have. We must find a solution within our own borders. The idea to forge a new dynasty is the only possible outcome here. On the electoral council there was only one name worth considering - our president, Jacek Majchrowski. But...one or two electors thought it would be funny to add Robert Makłowicz to the list. What was just a unnoticable joke, is gaining a momentum while the rumors are spreading."
 krakow_krul.7.a: "Jacek Majchrowski"
 krakow_krul.7.b: "Robert Makłowicz"

 krakow_sci.1.t: "Supreme Rector"
 krakow_sci.1.desc: "Science is a key to power. And Jacek Majchrowski knows it well, being at the same time a scholar and a politician. But this time he will require all the keys that exist in this city. Position of a Supreme Rector would grant him unparalleled influence over the academic and scientific community in Kraków. Of course, this is a double-edged sword, as it also places him under intense scrutiny and pressure. And if he fails to unite the academic factions, the consequences could be dire."
 krakow_sci.1.a: "Mother always said that you need to learn..."

 krakow_sci.2.t: "Grants for the Universities"
 krakow_sci.2.desc: "The allocation of grants to universities is a crucial decision that can shape the future of academic research and education in Kraków. Jacek Majchrowski must carefully consider which institutions to support, balancing the needs of different faculties and ensuring that resources are used effectively to promote scientific advancement."
 krakow_sci.2.a: "Elevate UJ"
 krakow_sci.2.b: "Don't play favorites"
 krakow_sci.2.c: "Elevate AGH"

 krakow_sci.3.t: "Academical Dispute"
 krakow_sci.3.desc: "A heated debate that has divided the academic community in Kraków got out of hand. Now, two most prominent universities are at odds, and the entire population is watching with bated breath."
 krakow_sci.3.a: "Side with UJ"
 krakow_sci.3.b: "Side with AGH"

 krakow_sci_uj.1.t: "Plus Ratio Quam Vis"
 krakow_sci_uj.1.desc: "President Majchrowski's gambit didn't really pay off as expected. Influence of the Jagiellonian University is stronger than ever, consolidating its position in the academic hierarchy. And they don't agree with civilian oversight from the Magistrate."
 krakow_sci_uj.1.a: "That was quick..."

 krakow_sci_uj.2.t: "Question of Grants for AGH"
 krakow_sci_uj.2.desc: "Now that Jagiellonian University is in power in the city, we have an unique opportunity to influence the allocation of grants. The question arises: should we support AGH as well, or focus solely on Jagiellonian University? They are our opponent, and they have enough. We need the funds more than they do."
 krakow_sci_uj.2.a: "Cut the funding"
 krakow_sci_uj.2.b: "Leave them in peace"

 krakow_sci_uj.3.t: "Rebellion of a Lesser Academy"
 krakow_sci_uj.3.desc: "AGH is now in an open rebellion. Those ungrateful lesser academics are trying to force our hand by going directly against us. We will need to show them this time that pen mayhaps be mightier than a sword, but it doesn't mean that we can't use the sword to conserve our internal peace. They will regret this decision."
 krakow_sci_uj.3.a: "Crush them!"

 krakow_sci_uj.4.t: "First Academic Congress"
 krakow_sci_uj.4.desc: "Managing to avoid a disastrous conflict, various academic leaders have come together to discuss the future of higher education in Kraków. And a politics that will now come with the mantle of it. Of course, leading university have the biggest influence amongst every other one, thus probably making Jagiellonian University on its way to become main administrative force in the city. But, additionally there is a proposition of Professor Antoni Dudek, who before the Fall participated in academic project of creating a whole new political system for the country. It might be interesting to try it out now..."
 krakow_sci_uj.4.a: "Let's agree on Poland - Antoni Dudek"
 krakow_sci_uj.4.b: "Let's stick with academics"

 krakow_sci_agh.1.t: "Labore Creata, Labori et Scientiae Servio"
 krakow_sci_agh.1.desc: "President Majchrowski's gambit didn't really pay off as expected. Influence of AGH is stronger than ever, consolidating its position in the academic hierarchy. And they don't agree with civilian oversight from the Magistrate."
 krakow_sci_agh.1.a: "That was quick..."

 krakow_sci_agh.2.t: "Question of Grants for Jagiellonian University"
 krakow_sci_agh.2.desc: "Now that AGH is in power in the city, we have an unique opportunity to influence the allocation of grants. The question arises: should we support Jagiellonian University as well, or focus solely on AGH? They are our opponent, and they have enough. We need the funds more than they do."
 krakow_sci_agh.2.a: "Cut the funding"
 krakow_sci_agh.2.b: "Leave them in peace"

 krakow_sci_agh.3.t: "Brutal Wave of Arrogancy"
 krakow_sci_agh.3.desc: "Jagiellonian University is now in an open rebellion. Those ungrateful lesser academics are trying to force our hand by going directly against us. We will need to show them this time that pen mayhaps be mightier than a sword, but it doesn't mean that we can't use the sword to conserve our internal peace. They will regret this decision."
 krakow_sci_agh.3.a: "Crush them!"

 krakow_sci_agh.4.t: "First Academic Congress"
 krakow_sci_agh.4.desc: "Managing to avoid a disastrous conflict, various academic leaders have come together to discuss the future of higher education in Kraków. And a politics that will now come with the mantle of it. Of course, leading university have the biggest influence amongst every other one, thus probably making AGH on its way to become main administrative force in the city. But, additionally there is a proposition of Professor Antoni Dudek, who before the Fall participated in academic project of creating a whole new political system for the country. It might be interesting to try it out now..."
 krakow_sci_agh.4.a: "Let's agree on Poland - Antoni Dudek"
 krakow_sci_agh.4.b: "Let's stick with academics"

 krakow_dem.1.t: "Freedom Squat"
 krakow_dem.1.desc: "In the Student Campus of AGH, there are many students that want freedom. And Konrad Berkowicz became the symbol of their freedom. While they're sitting in the campus, drinking, whinging and trying to fight one another, we are getting more and more complaints from neighbors that this is becoming something more than a simple student evening. This is becoming political issue and we can't allow ourselves to have a pestering wound of libertarianism next to our city centre. While pacifying them might blow up in our faces, appeasing them might not seem possible due to lack of arguments from our side that they would listen to."
 krakow_dem.1.a: "Pacification"
 krakow_dem.1.b: "Appeasement"

 krakow_dem.2.t: "Unification Mass"
 krakow_dem.2.desc: "Jan Maria Rokita, once a conservative man of Civic Platform, now peddles in right-wing propaganda trying to undermine our rule. He organised an Unification Mass in Łagiewniki and thanks to his reputation, he managed to invite a lot of the city clerks. He knows them personally and this might become a start of a new opposition. And it's not sensible that we would allow our administration to lose faith in our rule. But, if we forbid them...they might just go there in spite."
 krakow_dem.2.a: "Let them go"
 krakow_dem.2.b: "Forbid them from going"

 krakow_dem.3.t: "Announcement of the [GetYear] Elections"
 krakow_dem.3.desc: "The upcoming elections have been announced, and the city is buzzing with anticipation. Citizens are preparing to cast their votes, and political factions are strategizing their campaigns. The outcome almost certain, but the stakes are nevertheless high. Whoever gains the most influence after the ruling party, might just become a dent in this political iron curtain that has befallen unto the city of Kraków."
 krakow_dem.3.a: "We know who's gonna win, right?"

 krakow_dem.4.t: "An Unwanted Participant"
 krakow_dem.4.desc: "Łukasz Gibała, enemy of our regime - currently hiding somewhere in Nowa Huta, wants to participate in the elections. He never won anything, and he won't win anything this time either, but even allowing him to participate might give him a platform to spread his ideas. Of course, we can always forbid him from participating and perhaps even try to get rid of him once and for all."
 krakow_dem.4.a: "No way - he's a criminal"
 krakow_dem.4.b: "Allow him to participate"
 krakow_dem.4.c: "Prepare a raid to arrest him"

 krakow_dem.5.t: "Gibała Arrested"
 krakow_dem.5.desc: "Perfectly orchestrated operation brought us a great success. We have managed to arrest one of the biggest enemies of our state - Łukasz Gibała always tried to undermine our position, and now he won't be bothering us anymore."
 krakow_dem.5.a: "The Magistrate always wins"

 krakow_dem.6.t: "Gibała Escapes"
 krakow_dem.6.desc: "Gibała managed to escape our trap and he is now hiding somewhere with the other reactionists. This is not good, as the failure of this mission will deal us a massive blow to our stability, but...at least he's not going to be our problem for the upcoming weeks."
 krakow_dem.6.a: "This is getting out of hand..."

 krakow_dem.7.t: "Our Territory have been Attacked"
 krakow_dem.7.desc: "Magistrate thugs have crossed our borders and entered a heart of Nowa Huta in order to capture one of the exiles that were hiding here with us. This is not the first time that they are testing our resolve, and trying to ascert their dominance over us. They treat us as dogs and they expect us to just cower and hide whenever they come to pester us. Will we finally stand and fight back or we will just scuttle to our holes again?"
 krakow_dem.7.a: "We don't really care about Gibała"
 krakow_dem.7.b: "TO WAAAAAAAAAAAAAR"

 krakow_dem.8.t: "[GetYear] Kraków Elections"
 krakow_dem.8.desc: "The citizens of Kraków are heading to the polls to decide the future leadership of the city. Various political factions are vying for control, each with their own vision for the city's development. It's pretty sure that Majchrowski's coalition will win, but it will still be an important question which faction will be a second power in the city."
 krakow_dem.8.a: "Kraków Unification Action"
 krakow_dem.8.b: "Kraków Coalition"
 krakow_dem.8.c: "Change Course"
 krakow_dem.8.d: "Freedom Front"

 krakow_dem.9.t: "Błonie Protest"
 krakow_dem.9.desc: "There is a massive protest happening right outside the gates of the city centre. Citizens are demanding change and expressing their dissatisfaction with the current administration. And it looks like it's not going to dissipate anytime soon, and might become a dangerous rebellion. It's time to pick our side."
 krakow_dem.9.a: "We stand with Majchrowski"
 krakow_dem.9.b: "Rokita will unite our city!"

 krakow_dem.10.t: "Old Town Occupation"
 krakow_dem.10.desc: "Opposition forces have joined their forces in order to try to bring down our rule! Right now, they're occupying the Old Town and they're forcing us to relocate administration to other parts of the town. It's starting to look like we might not be on the winning side of this..."
 krakow_dem.10.a: "Rokita leads the people on Magistrate!"

 krakow_dem.11.t: "Second Freedom Squat"
 krakow_dem.11.desc: "There is a second Freedom Squat happening on the outskirts of our city. Citizens are demanding change and expressing their dissatisfaction with the current administration. And it looks like it's not going to dissipate anytime soon, and might become a dangerous rebellion. It's time to pick our side."
 krakow_dem.11.a: "We stand with Majchrowski"
 krakow_dem.11.b: "Freedom! Property! Justice!"

 krakow_dem.12.t: "March on Magistrate"
 krakow_dem.12.desc: "Opposition forces have joined their forces in order to try to bring down our rule! Right now, they're occupying the Old Town and they're forcing us to relocate administration to other parts of the town. It's starting to look like we might not be on the winning side of this..."
 krakow_dem.12.a: "Berkowicz manages to seize power!"

 krakow_dem.13.t: "Gibała Election Protest"
 krakow_dem.13.desc: "There is a massive protest happening right outside the gates of the city centre. Citizens are demanding change and expressing their dissatisfaction with the current administration. And it looks like it's not going to dissipate anytime soon, and might become a dangerous rebellion. It's time to pick our side."
 krakow_dem.13.a: "Motion denied"
 krakow_dem.13.b: "Gibała will lead us to freedom!"

 krakow_dem.14.t: "First This Time"
 krakow_dem.14.desc: "Łukasz Gibała and his followers declared the open rebellion against the forces of the Magistrate! We knew he was always going to be a thorn in our side, but this time it will be a final showdown between us, because only one can rule this city. The final rebellion begins as the city is preparing for the civil war."
 krakow_dem.14.a: "Royal City weeps with blood"

 krakow_dem.15.t: "Eternal President"
 krakow_dem.15.desc: "There are no politicians that could even compare with Jacek Majchrowski's cunning and political supremacy. He managed to outsmart every local political opponent and clinged to his rule like a tree clings to the ground. Rooted deepily, his administration with slight changes is now ready to expand their rule beyond the borders of Kraków as the future of this city is as it was: Under Majchrowski's steady and neverchanging leadership."
 krakow_dem.15.a: "There was no other option"